          render();
        });
        return btn;
      })
    );
  } else if(fs.type==='alternate'){
    schedExtra=h('div',{className:'sched-alt-row'},
      ...([{v:'odd',label:'Odd Days  (1,3,5…)'},{v:'even',label:'Even Days  (2,4,6…)'}]).map(({v,label})=>{
        const btn=h('button',{className:'sched-alt-btn'+(fs.alt===v?' active':'')},label);
        btn.addEventListener('click',()=>{state.formSchedule={...fs,alt:v};render()});
        return btn;
      })
    );
  } else if(fs.type==='xweek'){
    const inp=h('input',{className:'sched-xweek-input',type:'number',min:'1',max:'7',value:fs.count||3});
    inp.addEventListener('change',e=>state.formSchedule={...fs,count:Math.min(7,Math.max(1,parseInt(e.target.value)||1))});
    schedExtra=h('div',{className:'sched-xweek-row'},
      inp,
      h('span',{style:{fontSize:'11px',color:'var(--text2)'}},'times per week (any days)')
    );
  }

  // Optional time window — clean pill toggle, no checkbox
  const tw=state.formTimeWindow;

  const twOff=h('div',{className:'tw-toggle-opt'+(tw?'':' active')},'⏱ No window');
  const twOn=h('div',{className:'tw-toggle-opt'+(tw?' active':'')},'🕐 Set window');
  twOff.addEventListener('click',()=>{state.formTimeWindow=null;render();});
  twOn.addEventListener('click',()=>{if(!tw){state.formTimeWindow={start:'06:00',end:'08:00'};render();}});
  const twToggle=h('div',{className:'tw-toggle-row'},twOff,twOn);

  let twInputs=null;
  if(tw){
    const startInp=document.createElement('input');
    startInp.type='time'; startInp.className='tw-time-input'; startInp.value=tw.start||'06:00';
    startInp.addEventListener('change',e=>{state.formTimeWindow={...tw,start:e.target.value};render()});

    const endInp=document.createElement('input');
    endInp.type='time'; endInp.className='tw-time-input'; endInp.value=tw.end||'08:00';
    endInp.addEventListener('change',e=>{state.formTimeWindow={...tw,end:e.target.value};render()});

    // Compute timeline fill percentages
    function toMins(hhmm){const[h,m]=(hhmm||'00:00').split(':').map(Number);return h*60+m}
    const sMin=toMins(tw.start||'06:00');
    const eMin=toMins(tw.end||'08:00');
    const totalDay=24*60;
    const leftPct=(sMin/totalDay*100).toFixed(1)+'%';
    const widthPct=(Math.max(0,(eMin-sMin))/totalDay*100).toFixed(1)+'%';
    const dur=Math.max(0,eMin-sMin);
    const durLabel=dur>0?`${Math.floor(dur/60)}h${dur%60?` ${dur%60}m`:''}  window`:'set end after start';

    twInputs=h('div',{className:'tw-picker'},
      h('div',{className:'tw-picker-row'},

        h('span',{className:'tw-picker-label'},'End'),
        endInp
      ),
      // visual timeline
      h('div',null,
        h('div',{className:'tw-timeline'},
          h('div',{className:'tw-timeline-fill',style:{left:leftPct,width:widthPct}})
        ),
        h('div',{className:'tw-timeline-labels'},
          h('span',null,'12 AM'),
          h('span',null,'6 AM'),
          h('span',null,'12 PM'),
          h('span',null,'6 PM'),
          h('span',null,'12 AM')
        ),
        h('div',{style:{fontSize:'10px',color:'var(--blue)',fontWeight:'600',marginTop:'5px',fontFamily:'JetBrains Mono,monospace',textAlign:'center'}},durLabel)
      )
    );
  }
  const twHint=tw?h('div',{className:'tw-hint'},'⏰  During this window your habit card will pulse red — a clear nudge to get it done. You can still check it off any time though, no stress.'):null;

  const modal=h('div',{className:'modal'},
    h('h3',null,isEdit?'✏️ Edit Habit':'📝 New Habit'),
    h('label',null,'Habit Name'),nameInput,
    h('label',null,'Category'),catSel,
    h('label',null,'Emoji'),emojiGrid,
    h('label',null,'Color'),colorRow,
    h('label',null,'Schedule'),
    typeRow,
    schedExtra,
    h('label',null,'Time Window (optional)'),
    twToggle,
    twInputs,
    twHint,
    h('div',{className:'btn-row'},
      h('button',{className:'btn btn-s',onClick:closeModal},'Cancel'),
      h('button',{className:'btn btn-p',onClick:saveHabit},isEdit?'Save Changes':'Add Habit')
    )
  );
  setTimeout(()=>nameInput.focus(),50);
  overlay.appendChild(modal);
  return overlay;
}

function exportData(){
  const notes=load('ht2_notes',{});
  const data={
    __app:'habit-tracker-by-alok',   // marker so import can verify this is a real backup
    __version:1,
    exportedAt:new Date().toISOString(),
    habits:state.habits,
    checks:state.checks,
    mood:state.mood,
    motiv:state.motiv,
    notes,
    widgetOrder:state.widgetOrder,
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const dateStr=new Date().toISOString().slice(0,10); // YYYY-MM-DD
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`habit-tracker-backup-${dateStr}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

// Validate that a parsed JSON object actually looks like a real backup from
// this app before we ever touch existing localStorage data.
function isValidBackup(obj){
  if(!obj||typeof obj!=='object')return false;
  if(obj.__app!=='habit-tracker-by-alok')return false;
  if(!Array.isArray(obj.habits))return false;
  if(typeof obj.checks!=='object'||obj.checks===null)return false;
  return true;
}

function importDataFile(file){
  const reader=new FileReader();
  reader.onload=()=>{
    let parsed;
    try{ parsed=JSON.parse(reader.result); }
    catch(e){ alert("This file isn't valid JSON, so it can't be imported. Nothing was changed."); return; }

    if(!isValidBackup(parsed)){
      alert("This doesn't look like a Habit Tracker backup file, so importing it was cancelled to protect your existing data. Nothing was changed.");
      return;
    }

    const ok=confirm(
      'Importing this file will REPLACE all your current habits, check-ins, mood history, and notes.\n\n'+
      'This cannot be undone. Continue?'
    );
    if(!ok)return;

    // Replace the relevant localStorage keys + in-memory state, leave
    // leaderboard identity and cosmetic settings untouched.
    save('ht2_habits',parsed.habits||[]);
    save('ht2_checks',parsed.checks||{});
    save('ht2_mood',parsed.mood||{});
    save('ht2_motiv',parsed.motiv||{});
    save('ht2_notes',parsed.notes||{});
    if(parsed.widgetOrder)save('ht2_widget_order',parsed.widgetOrder);

    state.habits=parsed.habits||[];
    state.checks=parsed.checks||{};
    state.mood=parsed.mood||{};
    state.motiv=parsed.motiv||{};
    if(parsed.widgetOrder)state.widgetOrder=parsed.widgetOrder;

    setState({modal:null});
    if(lbIsSetUp())setTimeout(lbPushScore,50); // reflect new data in leaderboard score
    alert('Import complete — your data has been restored.');
  };
  reader.onerror=()=>{ alert("Couldn't read that file. Nothing was changed."); };
  reader.readAsText(file);
}

function triggerImport(){
  const input=document.createElement('input');
  input.type='file';
  input.accept='application/json,.json';
  input.addEventListener('change',e=>{
    const file=e.target.files&&e.target.files[0];
    if(file)importDataFile(file);
  });
  input.click();
}

// ── RESIZABLE WIDGETS ──────────────────────────────────────────────────────
function initResizable(){
  document.querySelectorAll('.widget').forEach(widget=>{
    // Add resize handle
    const handle=document.createElement('div');
    handle.className='resize-handle';
    widget.style.position='relative';
    widget.appendChild(handle);

    let startX,startY,startW,startH;
    handle.addEventListener('mousedown',e=>{
      e.preventDefault();
      startX=e.clientX;startY=e.clientY;
      startW=widget.offsetWidth;startH=widget.offsetHeight;
      const onMove=e=>{
        const nw=Math.max(200,startW+(e.clientX-startX));
        const nh=Math.max(100,startH+(e.clientY-startY));
        widget.style.width=nw+'px';
        widget.style.height=nh+'px';
        widget.style.overflow='hidden';
      };
      const onUp=()=>{
        document.removeEventListener('mousemove',onMove);
        document.removeEventListener('mouseup',onUp);
      };
      document.addEventListener('mousemove',onMove);
      document.addEventListener('mouseup',onUp);
    });
  });
}

// ── DRAGGABLE (basic reorder within main) ─────────────────────────────────
function initDraggable(){
  // Cards can be collapsed/expanded via the toggle buttons — drag handled via native HTML5
  // We attach drag handles to each .card inside .main-content's direct children
  const cards=document.querySelectorAll('.main-content > .card, .main-content > .widget');
  cards.forEach(card=>{
    card.setAttribute('draggable','true');
    card.style.cursor='default';
    const handle=document.createElement('div');
    handle.className='drag-handle';
    handle.title='Drag to reorder';
    handle.innerHTML='⠿';
    card.insertBefore(handle,card.firstChild);

    card.addEventListener('dragstart',e=>{
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
    });
    card.addEventListener('dragend',()=>card.classList.remove('dragging'));
    card.addEventListener('dragover',e=>{
      e.preventDefault();
      e.dataTransfer.dropEffect='move';
      const dragging=document.querySelector('.dragging');
      if(dragging&&dragging!==card){
        const rect=card.getBoundingClientRect();
        const mid=rect.top+rect.height/2;
        if(e.clientY<mid){
          card.parentNode.insertBefore(dragging,card);
        } else {
          card.parentNode.insertBefore(dragging,card.nextSibling);
        }
      }
    });
  });
}

  if(accent!=='green'&&accentMap[accent]){
    document.documentElement.style.setProperty('--green',accentMap[accent]);
    document.documentElement.style.setProperty('--green2',accentMap[accent]+'cc');
  }
})();

// First-ever visit: auto-open the "How to use Ascend" guide once, after a
// short delay so it doesn't pop up before the page has visually settled.
// The flag is permanent — it never auto-shows again after the first time,
// but the manual "📖 How to use Ascend" button in Settings always works.
if(!load('ht2_seen_howto',false)){
  setTimeout(()=>{
    save('ht2_seen_howto',true);
    openHowTo();
  },900);
}

// Re-render once a minute so time-window highlights (🔵 "do this now") turn
// on/off on their own as the clock crosses a window boundary, without
// needing any click. Cheap no-op if no habit has a time window set.
setInterval(()=>{ if(state.habits.some(hasTimeWindow)) render(); },60000);

// ── LEADERBOARD BOOT ─────────────────────────────────────────────────────────
// Firebase module script loads async and may resolve after render(). Once it's
// ready, kick off a push + live listener if this device already joined a group.
window.addEventListener('lb-ready',()=>{
  if(lbIsSetUp()){
    lbPushScore();
    lbStartListening();
    render(); // refresh the "live" dot now that __lb.configured is known
  }
});
// In case the module already resolved before this listener attached
if(window.__lb && window.__lb.configured && lbIsSetUp()){
  lbPushScore();
  lbStartListening();
}
