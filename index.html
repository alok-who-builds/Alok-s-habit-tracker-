<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>📔 Ascend — Build the life you're proud of</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Dark theme */
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#30363d;
  --border:#30363d;--border2:#444c56;
  --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --green:#39d353;--green2:#26a641;--green3:#196127;--green4:#0e4429;
  --blue:#58a6ff;--blue2:#1f6feb;
  --orange:#f0883e;--orange2:#d08030;
  --purple:#bc8cff;--red:#f85149;
  --gold:#e3b341;
  --card-bg:#161b22;--card-border:#30363d;
  --radar-bg:#0d1117;
}
body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);min-height:100vh;font-size:14px;overflow-x:hidden}

/* LAYOUT */
.app-wrap{display:flex;min-height:100vh}
.sidebar{width:220px;min-width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:100;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.main-content{margin-left:220px;flex:1;min-width:0;padding:20px 20px 20px 20px;display:flex;flex-direction:column;gap:16px;max-width:100%;transition:margin-left .3s cubic-bezier(.4,0,.2,1);padding-top:60px}

/* SIDEBAR */
.sb-logo{padding:16px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:4px}
.sb-logo-toprow{display:flex;align-items:center;gap:10px}
.sb-logo-icon{font-size:22px}
.sb-logo-text{font-size:15px;font-weight:700;letter-spacing:-.3px}
.sb-logo-sub{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;padding-left:32px}
.sb-section{padding:12px 14px;border-bottom:1px solid var(--border)}
.sb-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);font-weight:600;margin-bottom:8px}
.month-nav{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.month-nav button{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:4px;width:24px;height:24px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.month-nav button:hover{background:var(--bg4);border-color:var(--border2)}
.month-display{flex:1;text-align:center;font-size:12px;font-weight:600;color:var(--text)}
.year-sel{width:100%;padding:5px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif}
.year-sel:focus{outline:none;border-color:var(--blue)}
.habit-list{display:flex;flex-direction:column;gap:3px}
.h-item{display:flex;align-items:center;gap:6px;padding:5px 6px;border-radius:5px;cursor:default;position:relative;transition:background .15s}
.h-item:hover{background:var(--bg3)}
.h-emoji{font-size:15px;min-width:20px;text-align:center}
.h-name{flex:1;font-size:12px;font-weight:500;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.h-acts{display:none;gap:2px;position:absolute;right:4px}
.h-item:hover .h-acts{display:flex}
.ib{background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;padding:1px 4px;border-radius:3px;font-size:10px;line-height:1.4}
.ib:hover{background:var(--bg4);color:var(--text)}
.add-habit-btn{margin:12px 14px;display:flex;align-items:center;gap:8px;background:var(--green4);border:1px dashed var(--green3);color:var(--green);padding:8px 12px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;transition:all .2s;font-family:'Inter',sans-serif;width:calc(100% - 28px)}
.add-habit-btn:hover{background:var(--green3);border-style:solid}

.reset-modal-legacy{display:none}
.reset-opt{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.reset-opt-btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:8px 12px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:500;text-align:left;font-family:'Inter',sans-serif;transition:all .15s}
.reset-opt-btn:hover{border-color:#f85149;color:#f85149;background:rgba(248,81,73,.07)}
.reset-opt-btn.danger{color:#f85149;border-color:#f8514940}

/* SETTINGS DRAWER */
.sb-footer{padding:10px 14px;border-top:1px solid var(--border);margin-top:auto;flex-shrink:0}
.settings-gear-btn{display:flex;align-items:center;gap:8px;width:100%;background:transparent;border:1px solid var(--border);color:var(--text2);padding:7px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:500;font-family:'Inter',sans-serif;transition:all .2s}
.settings-gear-btn:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.settings-gear-btn .gear-icon{font-size:13px;transition:transform .4s}
.settings-gear-btn:hover .gear-icon{transform:rotate(60deg)}

.settings-drawer{position:fixed;left:0;bottom:0;width:220px;background:var(--bg2);border-top:1px solid var(--border);border-right:1px solid var(--border);z-index:200;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);overflow-y:auto;max-height:85vh;box-shadow:0 -8px 32px rgba(0,0,0,.4)}
.settings-drawer.open{transform:translateY(0)}
.settings-drawer-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border)}
.settings-drawer-title{font-size:12px;font-weight:700;letter-spacing:.5px;color:var(--text)}
.settings-close-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;width:22px;height:22px;border-radius:4px;font-size:12px;display:flex;align-items:center;justify-content:center}
.settings-close-btn:hover{color:var(--text);background:var(--bg4)}

.settings-section{padding:12px 16px;border-bottom:1px solid var(--border)}
.settings-section-label{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);font-weight:700;margin-bottom:10px}

/* Toggle switch */
.setting-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.setting-row:last-child{margin-bottom:0}
.setting-label{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:6px}
.toggle-sw{position:relative;width:32px;height:18px;flex-shrink:0}
.toggle-sw input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;inset:0;background:var(--bg4);border-radius:9px;cursor:pointer;transition:background .2s;border:1px solid var(--border2)}
.toggle-sw input:checked+.toggle-track{background:var(--green2);border-color:var(--green3)}
.toggle-track::after{content:'';position:absolute;width:12px;height:12px;background:#fff;border-radius:50%;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.toggle-sw input:checked+.toggle-track::after{transform:translateX(14px)}

/* Compact select in settings */
.setting-select{background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-size:10px;padding:3px 6px;border-radius:4px;font-family:'Inter',sans-serif;cursor:pointer;max-width:90px}
.setting-select:focus{outline:none;border-color:var(--blue)}

/* Reset section in drawer */
.drawer-reset-opts{display:flex;flex-direction:column;gap:6px;margin-top:2px}
.drawer-reset-btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:7px 10px;border-radius:5px;cursor:pointer;font-size:10px;font-weight:500;text-align:left;font-family:'Inter',sans-serif;transition:all .15s;width:100%}
.drawer-reset-btn:hover{border-color:#f85149;color:#f85149;background:rgba(248,81,73,.07)}
.drawer-reset-btn.danger-btn{color:#f85149;border-color:rgba(248,81,73,.25)}
.drawer-reset-btn.danger-btn:hover{background:rgba(248,81,73,.12);border-color:#f85149}

/* ── LIGHT MODE — warm journal theme ── */
body.light-mode{
  --bg:#fdf6ee;--bg2:#fffcf7;--bg3:#f5ede0;--bg4:#ecddd0;
  --border:#e2d4c4;--border2:#cfc0ad;
  --text:#2c1f14;--text2:#6b4f38;--text3:#a08060;
  --card-bg:#fffcf7;--card-border:#e8d9c8;
  --radar-bg:#fdf6ee;
  --green:#2d9e52;--green2:#27854a;--green3:#1f6b3a;--green4:#d6f0e0;
  --blue:#2f7fd4;--blue2:#1a5fa8;
  --orange:#d96b20;--orange2:#b85a18;
  --gold:#c9920a;
}
/* warm parchment page background */
body.light-mode{background:linear-gradient(160deg,#fdf6ee 0%,#fef9f2 60%,#fbf0e4 100%)}
/* sidebar warm cream */
body.light-mode .sidebar{background:linear-gradient(180deg,#fffcf7 0%,#fdf6ee 100%);border-right-color:#e2d4c4;box-shadow:2px 0 12px rgba(180,140,100,.1)}
body.light-mode .sb-logo{background:linear-gradient(135deg,#fff8f0,#fdf0e0);border-bottom-color:#e2d4c4}
body.light-mode .sb-logo-text{color:#2c1f14}
body.light-mode .sb-logo-sub{color:#a08060}
/* warm cards with subtle shadow */
body.light-mode .card{background:linear-gradient(150deg,#fffcf7 0%,#fff8f2 100%);border-color:#e8d9c8;box-shadow:0 2px 12px rgba(160,110,70,.09),0 1px 3px rgba(160,110,70,.06)}
body.light-mode .card:hover{box-shadow:0 4px 20px rgba(160,110,70,.14),0 1px 4px rgba(160,110,70,.08)}
/* month header gets a warm gradient */
body.light-mode .month-header{background:linear-gradient(135deg,#fff4e6 0%,#ffe8cc 60%,#ffddb3 100%);border-color:#e8c99a;box-shadow:0 2px 12px rgba(200,140,70,.12)}
body.light-mode .mh-left h1{color:#2c1f14}
body.light-mode .mh-left p{color:#a08060}
/* checklist cards */
body.light-mode .check-card{background:linear-gradient(135deg,#fdf8f2 0%,#faf3ea 100%);border-color:#e2d4c4}
body.light-mode .check-card:hover{background:linear-gradient(135deg,#fff4e6 0%,#ffefd8 100%);border-color:#cfc0ad}
body.light-mode .check-card.done{background:linear-gradient(135deg,#e8f7ee 0%,#d6f0e0 100%);border-color:#a8dbb8}
body.light-mode .check-icon{border-color:#cfc0ad;background:#fffcf7}
body.light-mode .check-card.done .check-icon{background:var(--green);border-color:var(--green)}
/* stat badges */
body.light-mode .stat-badge{background:linear-gradient(135deg,#fdf4e8 0%,#faeadb 100%);border-color:#e2d4c4;box-shadow:0 1px 4px rgba(160,110,70,.08)}
/* settings drawer */
body.light-mode .settings-drawer{background:linear-gradient(180deg,#fffcf7,#fdf6ee);border-color:#e2d4c4;box-shadow:0 -6px 24px rgba(160,110,70,.12)}
body.light-mode .settings-drawer-header{border-bottom-color:#e2d4c4;background:linear-gradient(135deg,#fff4e6,#faeadb)}
body.light-mode .toggle-track{background:#e2d4c4;border-color:#cfc0ad}
body.light-mode .mood-day-card{background:linear-gradient(135deg,#fdf8f2,#faf3ea);border-color:#e2d4c4}
body.light-mode .mood-day-card.today-card{background:linear-gradient(135deg,#e8f7ee,#d6f0e0);border-color:#82c99a}
body.light-mode .add-habit-btn{background:linear-gradient(135deg,#e8f7ee,#d6f0e0);border-color:#82c99a;color:var(--green)}
body.light-mode .add-habit-btn:hover{background:linear-gradient(135deg,#d6f0e0,#bce8cc)}
body.light-mode .modal{background:linear-gradient(150deg,#fffcf7,#fdf6ee);border-color:#e8d9c8;box-shadow:0 24px 60px rgba(100,60,20,.2)}
body.light-mode .modal input[type=text],.light-mode .modal select{background:#fdf4e8;border-color:#e2d4c4;color:#2c1f14}
body.light-mode .eg,.light-mode .cr{background:#fdf4e8;border-color:#e2d4c4}
body.light-mode .at tr:hover td{background:#fdf4e8}
body.light-mode .at th{border-bottom-color:#e2d4c4;color:#a08060}
body.light-mode .at td{border-bottom-color:#f0e4d4}
body.light-mode .pb-bg{background:#ecddd0}
/* heatmap */
body.light-mode .heat-cell[data-level="0"]{background:#f0e6d8}
body.light-mode .heat-cell[data-level="1"]{background:#b8e4c4}
body.light-mode .heat-cell[data-level="2"]{background:#6dcc8a}
body.light-mode .heat-cell[data-level="3"]{background:#30a14e}
body.light-mode .heat-cell[data-level="4"]{background:#1e7a38;box-shadow:0 0 4px rgba(30,122,56,.4)}
body.light-mode .heat-cell[data-level="5"]{background:#155226;box-shadow:0 0 8px rgba(21,82,38,.5)}
/* scrollbar warm */
body.light-mode ::-webkit-scrollbar-track{background:#f5ede0}
body.light-mode ::-webkit-scrollbar-thumb{background:#cfc0ad;border-radius:4px}
body.light-mode .hamburger{background:#fffcf7;border-color:#e2d4c4;color:#2c1f14;box-shadow:0 2px 8px rgba(160,110,70,.15)}
body.light-mode .sb-overlay{background:rgba(44,31,20,.45)}

/* COMPACT MODE */
body.compact-mode .card{padding:10px}
body.compact-mode .check-card{padding:6px 8px}
body.compact-mode .stat-val{font-size:20px}
body.compact-mode .main-content{gap:10px}
body.compact-mode .checklist-grid{gap:5px}

/* CARDS */
.card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:8px;padding:16px;position:relative;overflow:hidden;min-width:0;max-width:100%;box-sizing:border-box}
.card-title{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.card-title-icon{font-size:14px}

/* GRID LAYOUTS */
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.row-heat{display:grid;grid-template-columns:2fr 1fr;gap:14px}

/* RESIZABLE WIDGET */
.widget{position:relative;min-height:80px}
.resize-handle{position:absolute;bottom:0;right:0;width:14px;height:14px;cursor:se-resize;opacity:0;transition:opacity .2s}
.widget:hover .resize-handle{opacity:1}
.resize-handle::after{content:'';position:absolute;bottom:3px;right:3px;width:8px;height:8px;border-bottom:2px solid var(--text3);border-right:2px solid var(--text3)}

/* STAT BADGES */
.stat-row{display:flex;gap:10px;flex-wrap:wrap}
.stat-badge{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:10px 14px;flex:1;min-width:90px;text-align:center}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;line-height:1;margin-bottom:3px}
.stat-val.green{color:var(--green)}
.stat-val.orange{color:var(--orange)}
.stat-val.blue{color:var(--blue)}
.stat-val.gold{color:var(--gold)}
.stat-lbl{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);font-weight:600}

/* MONTH HEADER */
.month-header{background:linear-gradient(135deg,var(--bg2) 0%,var(--bg3) 100%);border:1px solid var(--border);border-radius:10px;padding:18px 22px;display:flex;align-items:center;justify-content:space-between}
.mh-left h1{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-bottom:2px}
.mh-left p{font-size:11px;color:var(--text3)}
.mh-progress{display:flex;align-items:center;gap:14px}
.mh-ring{position:relative;width:64px;height:64px;flex-shrink:0}
.mh-ring svg{transform:rotate(-90deg)}
.mh-ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.mh-ring-pct{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--green);line-height:1}
.mh-ring-sub{font-size:7px;color:var(--text3)}
.mh-stats{display:flex;flex-direction:column;gap:4px}
.mh-stat{display:flex;align-items:center;gap:6px;font-size:10px}
.mh-stat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.mh-stat-val{font-family:'JetBrains Mono',monospace;font-weight:600}

/* CHECKLIST */
.checklist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.check-card{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .15s;user-select:none;min-height:48px}
.check-card:hover{border-color:var(--border2);background:var(--bg4)}
.check-card.done{border-color:var(--green3);background:rgba(57,211,83,.06)}
.check-icon{width:20px;height:20px;border-radius:4px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-size:12px}
.check-card.done .check-icon{background:var(--green);border-color:var(--green);color:#000}
.check-label{font-size:13px;font-weight:500;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.check-card.done .check-label{color:var(--text3);text-decoration:line-through}
.check-streak{font-size:10px;color:var(--orange);font-weight:700;flex-shrink:0}

/* HEATMAP (GitHub style, yearly) */
.heatmap-wrap{overflow-x:auto;padding-bottom:4px}
.heatmap-months{display:flex;gap:0;margin-bottom:4px;margin-left:28px}
.heatmap-month-label{font-size:9px;color:var(--text3);font-weight:500}
.heatmap-grid{display:flex;gap:3px}
.heatmap-days-col{display:flex;flex-direction:column;gap:2px;margin-right:4px;justify-content:space-around;padding-top:2px}
.heatmap-day-label{font-size:8px;color:var(--text3);height:11px;line-height:11px;text-align:right}
.heatmap-weeks{display:flex;gap:3px}
.heatmap-week{display:flex;flex-direction:column;gap:2px}
.heat-cell{width:11px;height:11px;border-radius:2px;background:var(--bg3);cursor:pointer;transition:all .2s;position:relative;border:1px solid transparent}
.heat-cell:hover{transform:scale(1.4);z-index:10;border-color:var(--text2)}
.heat-cell[data-level="0"]{background:#1c2128;border-color:transparent}
.heat-cell[data-level="1"]{background:#1a3a1f}
.heat-cell[data-level="2"]{background:#215e28}
.heat-cell[data-level="3"]{background:#2ea043}
.heat-cell[data-level="4"]{background:#3dd460;box-shadow:0 0 4px rgba(61,212,96,.45)}
.heat-cell[data-level="5"]{background:#57e879;box-shadow:0 0 8px rgba(87,232,121,.65)}
.heat-tooltip{position:fixed;background:var(--bg4);border:1px solid var(--border2);border-radius:5px;padding:5px 8px;font-size:10px;color:var(--text);pointer-events:none;z-index:1000;white-space:nowrap;display:none}

/* RADAR CHART */
.radar-container{display:flex;flex-direction:column;align-items:center;gap:12px}
.radar-svg{width:100%;max-width:320px;overflow:visible}
.radar-legend{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.radar-leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.radar-leg-dot{width:9px;height:9px;border-radius:50%}

/* ANALYSIS TABLE */
.at-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.at{width:100%;border-collapse:collapse;font-size:10px}
.at th{padding:6px 10px;text-align:left;font-size:9px;letter-spacing:1px;font-weight:600;color:var(--text3);border-bottom:1px solid var(--border);text-transform:uppercase}
.at td{padding:6px 10px;border-bottom:1px solid var(--border)}
.at tr:last-child td{border-bottom:none}
.at tr:hover td{background:var(--bg3)}
.pb-bg{background:var(--bg3);border-radius:10px;height:5px;overflow:hidden;min-width:60px}
.pb-fill{height:100%;border-radius:10px;transition:width .5s}
.streak-badge{background:rgba(240,136,62,.15);color:var(--orange);border:1px solid rgba(240,136,62,.3);padding:1px 5px;border-radius:10px;font-size:8px;font-weight:700}

/* TOP HABITS */
.top-list{display:flex;flex-direction:column;gap:6px}
.top-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.top-item:last-child{border-bottom:none}
.rank-badge{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.r1{background:var(--gold);color:#000}.r2{background:#8b949e;color:#000}.r3{background:#c4762a;color:#fff}.rn{background:var(--bg3);color:var(--text3)}

/* MOOD - popup-based interactive */
.mood-week-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;padding-top:4px;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}
.mood-week-strip::-webkit-scrollbar{height:4px}
.mood-week-strip::-webkit-scrollbar-track{background:transparent}
.mood-week-strip::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}

.mood-day-card{flex-shrink:0;width:62px;background:var(--bg3);border:1.5px solid var(--border);border-radius:12px;padding:8px 6px 10px;display:flex;flex-direction:column;align-items:center;gap:6px;transition:border-color .2s,box-shadow .2s;position:relative}
.mood-day-card:hover{border-color:var(--border2);box-shadow:0 2px 10px rgba(0,0,0,.25)}
.mood-day-card.today-card{border-color:var(--green2);background:rgba(57,211,83,.07);box-shadow:0 0 0 1px rgba(57,211,83,.18)}
.mood-day-card.past-card{opacity:.38;pointer-events:none;filter:saturate(.4)}
.mood-day-card.past-card .mood-day-num{color:var(--text3)}
.mood-day-num{font-size:9px;font-weight:700;color:var(--text3);font-family:'JetBrains Mono',monospace;letter-spacing:.3px}

/* Mood trigger button */
.mood-trigger{font-size:22px;cursor:pointer;border-radius:8px;width:40px;height:36px;border:1.5px solid transparent;background:none;display:flex;align-items:center;justify-content:center;transition:all .15s;padding:0}
.mood-trigger:hover{background:var(--bg4);transform:scale(1.1)}
.mood-trigger:active{transform:scale(.92)}
.mood-trigger.picked{border-color:var(--orange);background:rgba(240,136,62,.1)}

/* Energy trigger */
.energy-trigger{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:3px 4px;border-radius:6px;border:1.5px solid transparent;background:none;transition:all .15s;width:100%}
.energy-trigger:hover{background:var(--bg4)}
.energy-trigger.has-energy{border-color:rgba(88,166,255,.35);background:rgba(88,166,255,.07)}
.energy-trigger-label{font-size:8px;color:var(--text3);font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.energy-mini-bars{display:flex;gap:2px;align-items:flex-end;height:12px}
.energy-mini-bar{width:5px;border-radius:1px;background:var(--bg4);transition:background .15s}
.energy-mini-bar.lit{background:var(--blue)}

/* Note trigger */
.note-trigger{font-size:13px;cursor:pointer;padding:2px 5px;border-radius:5px;border:1.5px solid transparent;background:none;color:var(--text3);transition:all .15s;width:100%;display:flex;align-items:center;justify-content:center;gap:3px}
.note-trigger:hover{background:var(--bg4);color:var(--text2)}
.note-trigger.has-note{color:var(--orange);border-color:rgba(240,136,62,.3);background:rgba(240,136,62,.07)}
.note-trigger-text{font-size:8px;font-weight:600;letter-spacing:.3px;font-family:'Inter',sans-serif}

/* ── MOOD POPUP ── */
.mood-popup{position:fixed;z-index:600;background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:10px 10px 8px;box-shadow:0 8px 32px rgba(0,0,0,.55),0 2px 8px rgba(0,0,0,.3);display:none;flex-direction:column;gap:6px;min-width:220px}
.mood-popup.visible{display:flex;animation:popIn .18s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{opacity:0;transform:scale(.88) translateY(6px)}to{opacity:1;transform:scale(1) translateY(0)}}
.mood-popup-label{font-size:9px;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);font-weight:700;padding:0 2px}
.mood-emoji-row{display:flex;gap:4px;align-items:center}
.mood-popup-emoji{font-size:24px;cursor:pointer;padding:5px;border-radius:9px;border:2px solid transparent;transition:all .12s;line-height:1;background:none}
.mood-popup-emoji:hover{background:var(--bg4);transform:scale(1.2)}
.mood-popup-emoji.active{border-color:var(--orange);background:rgba(240,136,62,.15);transform:scale(1.1)}
.mood-popup-sublabels{display:flex;justify-content:space-between;padding:0 3px}
.mood-popup-sub{font-size:8px;color:var(--text3);font-weight:500}

/* ── ENERGY POPUP ── */
.energy-popup{position:fixed;z-index:600;background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:12px 14px 10px;box-shadow:0 8px 32px rgba(0,0,0,.55),0 2px 8px rgba(0,0,0,.3);display:none;flex-direction:column;gap:8px;min-width:200px}
.energy-popup.visible{display:flex;animation:popIn .18s cubic-bezier(.34,1.56,.64,1)}
.energy-popup-label{font-size:9px;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);font-weight:700}
.energy-bars-row{display:flex;gap:5px;align-items:flex-end;height:36px}
.energy-popup-bar{flex:1;border-radius:3px;background:var(--bg4);border:1px solid var(--border);cursor:pointer;transition:all .15s;min-width:22px}
.energy-popup-bar:hover{border-color:var(--blue);filter:brightness(1.3)}
.energy-popup-bar.lit{background:var(--blue);border-color:var(--blue2);box-shadow:0 0 6px rgba(88,166,255,.35)}
.energy-popup-sublabels{display:flex;justify-content:space-between}
.energy-popup-sub{font-size:8px;color:var(--text3);font-weight:500}

/* ── NOTE MODAL ── */
.note-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:700;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px);animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.note-modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:22px;width:min(420px,calc(100vw - 32px));box-shadow:0 24px 60px rgba(0,0,0,.6);display:flex;flex-direction:column;gap:12px;animation:popIn .2s cubic-bezier(.34,1.56,.64,1)}
.note-modal-header{display:flex;align-items:center;justify-content:space-between}
.note-modal-title{font-size:14px;font-weight:700;color:var(--text)}
.note-modal-date{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.note-modal-close{background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;width:26px;height:26px;border-radius:6px;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.note-modal-close:hover{background:var(--bg4);color:var(--text)}
.note-modal-textarea{width:100%;min-height:140px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;line-height:1.6;padding:12px 14px;resize:vertical;outline:none;transition:border-color .15s}
.note-modal-textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(88,166,255,.1)}
.note-modal-textarea::placeholder{color:var(--text3)}
.note-modal-footer{display:flex;gap:8px;justify-content:flex-end}
.note-modal-save{background:var(--blue2);border:none;color:#fff;padding:8px 18px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;font-family:'Inter',sans-serif;transition:background .15s}
.note-modal-save:hover{background:var(--blue)}
.note-modal-cancel{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:8px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;font-family:'Inter',sans-serif;transition:all .15s}
.note-modal-cancel:hover{background:var(--bg4);color:var(--text)}

/* ── HOW TO USE MODAL — Ascend branded ── */
.howto-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:800;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);animation:fadeIn .18s ease;padding:16px}
.howto-modal{background:var(--bg2);border:1px solid var(--border2);border-radius:18px;width:min(640px,100%);max-height:88vh;overflow-y:auto;box-shadow:0 28px 80px rgba(0,0,0,.65);display:flex;flex-direction:column;animation:popIn .22s cubic-bezier(.34,1.56,.64,1)}
.howto-header{background:linear-gradient(135deg,#1a2a4a 0%,#0d1117 50%,#1a0d2e 100%);padding:28px 28px 22px;border-radius:18px 18px 0 0;position:sticky;top:0;z-index:2;flex-shrink:0}
.howto-brand{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.howto-brand-icon{font-size:32px;line-height:1}
.howto-brand-name{font-size:26px;font-weight:800;letter-spacing:-.8px;background:linear-gradient(135deg,#58a6ff,#bc8cff,#39d353);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.howto-brand-sub{font-size:11px;color:#8b949e;letter-spacing:.5px;font-style:italic}
.howto-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#e6edf3;width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.howto-close:hover{background:rgba(255,255,255,.2)}
.howto-body{padding:24px 28px 28px;display:flex;flex-direction:column;gap:20px}
.howto-section{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px 18px;position:relative;overflow:hidden}
.howto-section::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;border-radius:2px 0 0 2px}
.howto-section.s-green::before{background:linear-gradient(180deg,#39d353,#26a641)}
.howto-section.s-blue::before{background:linear-gradient(180deg,#58a6ff,#1f6feb)}
.howto-section.s-orange::before{background:linear-gradient(180deg,#f0883e,#d08030)}
.howto-section.s-purple::before{background:linear-gradient(180deg,#bc8cff,#9b5de5)}
.howto-section.s-gold::before{background:linear-gradient(180deg,#e3b341,#c99a20)}
.howto-section.s-red::before{background:linear-gradient(180deg,#f85149,#c93d36)}
.howto-section.s-teal::before{background:linear-gradient(180deg,#39c5c5,#1a9b9b)}
.howto-section-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.howto-section-title span{font-size:18px}
.howto-section p{font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:6px}
.howto-section p:last-child{margin-bottom:0}
.howto-tip{background:var(--bg4);border-radius:7px;padding:7px 10px;font-size:11px;color:var(--text2);line-height:1.6;margin-top:8px;border-left:2px solid var(--green)}
.howto-tag{display:inline-flex;align-items:center;gap:4px;background:rgba(88,166,255,.12);color:var(--blue);border:1px solid rgba(88,166,255,.22);border-radius:20px;padding:1px 8px;font-size:10px;font-weight:600;margin:2px 2px}
.howto-tag.orange{background:rgba(240,136,62,.12);color:var(--orange);border-color:rgba(240,136,62,.22)}
.howto-tag.green{background:rgba(57,211,83,.1);color:var(--green);border-color:rgba(57,211,83,.2)}
.howto-tag.red{background:rgba(248,81,73,.1);color:#f85149;border-color:rgba(248,81,73,.2)}
.howto-footer{text-align:center;padding:0 28px 24px;font-size:11px;color:var(--text3);line-height:1.8}
.howto-footer strong{color:var(--text2)}
@media(max-width:600px){
  .howto-modal{max-height:92vh;border-radius:14px}
  .howto-header{padding:20px 18px 16px;border-radius:14px 14px 0 0}
  .howto-brand-name{font-size:22px}
  .howto-body{padding:16px 18px 20px;gap:14px}
  .howto-section{padding:13px 14px}
}

/* Mood sparkline */
.mood-sparkline-wrap{margin-bottom:12px;padding:10px 12px;background:var(--bg3);border-radius:8px;border:1px solid var(--border)}
.mood-sparkline-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:6px;font-weight:500}
.mood-sparkline-svg{width:100%;height:44px;display:block}
.mood-legend{display:flex;gap:14px;font-size:11px;color:var(--text2);margin-top:8px}
.mood-legend span{display:flex;align-items:center;gap:5px}
.mood-legend-dot{width:10px;height:3px;border-radius:2px;display:inline-block}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:24px;width:340px;box-shadow:0 20px 60px rgba(0,0,0,.5);max-height:88vh;overflow-y:auto;box-sizing:border-box}
.modal h3{font-size:18px;font-weight:700;margin-bottom:16px;letter-spacing:-.3px}
.modal label{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);font-weight:600;display:block;margin-bottom:4px}
.modal input[type=text],.modal select{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:5px;font-size:13px;background:var(--bg3);color:var(--text);margin-bottom:12px;font-family:'Inter',sans-serif}
.modal input:focus,.modal select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(88,166,255,.1)}
.eg{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px;max-height:130px;overflow-y:auto;padding:4px;background:var(--bg3);border-radius:6px;border:1px solid var(--border)}
.eo{font-size:20px;cursor:pointer;padding:4px;border-radius:5px;border:2px solid transparent;transition:all .1s;line-height:1}
.eo:hover{background:var(--bg4);transform:scale(1.15)}.eo.sel-e{border-color:var(--blue);background:var(--bg4);transform:scale(1.1)}
.cr{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;padding:6px;background:var(--bg3);border-radius:6px;border:1px solid var(--border)}
.co{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s,box-shadow .15s}
.co:hover{transform:scale(1.2);box-shadow:0 0 6px currentColor}
.co.sel-c{border-color:var(--text);transform:scale(1.25);box-shadow:0 0 8px rgba(255,255,255,.3)}
.btn-row{display:flex;gap:8px;justify-content:flex-end}
.btn{padding:7px 16px;border-radius:5px;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:'Inter',sans-serif;transition:all .15s}
.btn-p{background:var(--blue2);color:#fff}.btn-p:hover{background:var(--blue)}
.btn-s{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}.btn-s:hover{background:var(--bg4)}

/* DRAGGABLE DASHBOARD */
.dashboard-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.draggable{position:relative;cursor:grab}
.draggable.dragging{opacity:.5;cursor:grabbing}
.drag-handle{position:absolute;top:6px;right:6px;color:var(--text3);font-size:10px;cursor:grab;opacity:0;transition:opacity .2s;z-index:5;padding:2px 4px;border-radius:3px}
.drag-handle:hover{background:var(--bg3);opacity:1!important}
.card:hover .drag-handle{opacity:.5}

/* PROGRESS BARS for daily */
.daily-bar-wrap{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.daily-bar-label{font-size:10px;color:var(--text2);min-width:30px;font-family:'JetBrains Mono',monospace}
.daily-bar-bg{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.daily-bar-fill{height:100%;border-radius:3px;transition:width .4s}
.daily-bar-pct{font-size:9px;color:var(--text3);min-width:32px;text-align:right;font-family:'JetBrains Mono',monospace}

/* SECTION TOGGLE */
.section-toggle{background:none;border:none;cursor:pointer;color:var(--text3);font-size:11px;padding:2px 5px;border-radius:3px;margin-left:auto}
.section-toggle:hover{background:var(--bg3);color:var(--text)}
.collapsed{display:none}

/* SCHEDULE */
.sched-type-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.sched-type-btn{flex:1;min-width:80px;padding:6px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;color:var(--text2);font-size:10px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;text-align:center;transition:all .15s}
.sched-type-btn:hover{border-color:var(--border2);color:var(--text)}
.sched-type-btn.active{background:rgba(88,166,255,.12);border-color:var(--blue);color:var(--blue)}
.sched-days-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.sched-day-btn{width:34px;height:28px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text3);font-size:10px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.sched-day-btn:hover{border-color:var(--border2);color:var(--text)}
.sched-day-btn.active{background:rgba(57,211,83,.15);border-color:var(--green2);color:var(--green)}
.sched-alt-row{display:flex;gap:6px;margin-bottom:10px}
.sched-alt-btn{flex:1;padding:6px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;color:var(--text2);font-size:10px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;text-align:center;transition:all .15s}
.sched-alt-btn:hover{border-color:var(--border2);color:var(--text)}
.sched-alt-btn.active{background:rgba(57,211,83,.12);border-color:var(--green2);color:var(--green)}
.sched-xweek-row{display:flex;gap:6px;align-items:center;margin-bottom:10px}

/* ── TIME WINDOW (modal form) — styled GUI ── */
.tw-toggle-row{display:flex;align-items:center;gap:0;margin-bottom:10px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;overflow:hidden;cursor:pointer;user-select:none}
.tw-toggle-opt{flex:1;text-align:center;padding:7px 10px;font-size:11px;font-weight:600;color:var(--text3);transition:all .15s}
.tw-toggle-opt.active{background:var(--blue2);color:#fff}
.tw-toggle-opt:first-child{border-right:1px solid var(--border2)}
/* visual time range picker */
.tw-picker{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;margin-bottom:10px;display:flex;flex-direction:column;gap:10px}
.tw-picker-row{display:flex;align-items:center;gap:10px}
.tw-picker-label{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);width:34px;flex-shrink:0}
.tw-time-input{background:var(--bg2);border:1px solid var(--border2);border-radius:7px;padding:7px 10px;color:var(--text);font-size:13px;font-family:'JetBrains Mono',monospace;width:110px;transition:border-color .15s,box-shadow .15s}
.tw-time-input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(88,166,255,.12)}
/* visual timeline bar */
.tw-timeline{position:relative;height:6px;background:var(--bg4);border-radius:3px;margin:2px 0}
.tw-timeline-fill{position:absolute;top:0;height:100%;background:linear-gradient(90deg,var(--blue2),var(--blue));border-radius:3px;transition:left .3s,width .3s}
.tw-timeline-labels{display:flex;justify-content:space-between;font-size:8px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-top:2px}
.tw-hint{font-size:10px;color:var(--text3);line-height:1.5;margin-bottom:12px;background:var(--bg3);border-radius:6px;padding:7px 9px;border-left:2px solid var(--blue2)}

/* ── TIME WINDOW (checklist) — 3 states ── */
/* BEFORE window: normal, just quiet badge */
.check-tw-badge{font-size:8px;color:var(--text3);font-family:'JetBrains Mono',monospace;flex-shrink:0;background:var(--bg4);padding:2px 6px;border-radius:8px;white-space:nowrap;display:flex;align-items:center;gap:3px}

/* ACTIVE window: urgent red pulse — DO IT NOW */
.check-card.tw-active{border-color:#f85149!important;animation:tw-urgent 1.4s ease-in-out infinite}
.check-card.tw-active .check-tw-badge{background:rgba(248,81,73,.18);color:#f85149;font-weight:700;border:1px solid rgba(248,81,73,.35)}
.check-card.tw-active .check-label{color:var(--text)!important}
@keyframes tw-urgent{
  0%,100%{box-shadow:0 0 0 1px #f85149,0 0 10px rgba(248,81,73,.3)}
  50%{box-shadow:0 0 0 2px #f85149,0 0 22px rgba(248,81,73,.55),0 0 40px rgba(248,81,73,.15)}
}
/* the little "NOW" flame badge inside active cards */
.tw-now-badge{display:inline-flex;align-items:center;gap:3px;background:#f85149;color:#fff;font-size:8px;font-weight:800;padding:2px 6px;border-radius:10px;letter-spacing:.5px;animation:tw-now-pop .6s ease-in-out infinite alternate;flex-shrink:0}
@keyframes tw-now-pop{from{transform:scale(1)}to{transform:scale(1.1)}}

/* PASSED window: dimmed, greyed out */
.check-card.tw-passed{opacity:.65}
.check-card.tw-passed .check-tw-badge{opacity:.5;text-decoration:line-through}

/* done during window: calm green, no pulse */
.check-card.tw-active.done{animation:none!important;box-shadow:none!important;border-color:var(--green3)!important;opacity:1}
.check-card.tw-active.done .check-tw-badge{background:rgba(57,211,83,.12);color:var(--green);border-color:rgba(57,211,83,.3)}
.sched-xweek-input{width:50px;padding:5px 8px;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-size:13px;text-align:center;font-family:'JetBrains Mono',monospace}
.sched-xweek-input:focus{outline:none;border-color:var(--blue)}
.sched-tag{font-size:8px;padding:1px 5px;border-radius:8px;font-weight:600;background:rgba(88,166,255,.12);color:var(--blue);border:1px solid rgba(88,166,255,.2);white-space:nowrap;flex-shrink:0}
.habit-skipped{opacity:.35}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}

/* TOOLTIP */
.heat-tooltip{position:fixed;background:#21262d;border:1px solid #444c56;border-radius:5px;padding:5px 8px;font-size:10px;color:#e6edf3;pointer-events:none;z-index:9999;white-space:nowrap}

<!-- ════════════════════════════════════════════════════════════════════════
     FIREBASE SETUP — LEADERBOARD (3 steps, ~3 minutes)
     1. Go to https://console.firebase.google.com → Create a project (free)
     2. In your project → Build → Firestore Database → Create database
        → Start in "test mode" (fine for a small friends-group leaderboard)
     3. Project Settings (gear icon) → scroll to "Your apps" → Add app → Web (</>)
        → copy the firebaseConfig object it gives you and paste it below,
        replacing the placeholder values.
     That's it — no other code changes needed. Everything else is wired up.
     ════════════════════════════════════════════════════════════════════════ -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore, doc, setDoc, onSnapshot, collection, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ─── FIREBASE CONFIG (from Firebase console → Project Settings) ───
  const firebaseConfig = {
    apiKey: "AIzaSyDD01qrE9qPcAPQxQJ57WaNTQJycePHh5Q",
    authDomain: "storage-for-habit-tracker.firebaseapp.com",
    projectId: "storage-for-habit-tracker",
    storageBucket: "storage-for-habit-tracker.firebasestorage.app",
    messagingSenderId: "675326765891",
    appId: "1:675326765891:web:fa63627fab32826c761df6"
  };
  // ───────────────────────────────────────────────────────────────────────

  let lbApp = null, lbDb = null, lbConfigured = false;
  try {
    if (firebaseConfig.apiKey && !firebaseConfig.apiKey.startsWith('PASTE_')) {
      lbApp = initializeApp(firebaseConfig);
      lbDb = getFirestore(lbApp);
      lbConfigured = true;
    }
  } catch (e) { console.warn('Firebase init failed:', e); }

  // Expose a tiny bridge so the main (non-module) app script can use Firestore
  window.__lb = {
    configured: lbConfigured,
    unsub: null,
    // Push my current score doc up to the shared group
    push(groupCode, username, payload) {
      if (!lbConfigured) return Promise.resolve(false);
      const ref = doc(lbDb, 'leaderboards', groupCode, 'members', username);
      return setDoc(ref, { ...payload, updatedAt: serverTimestamp() })
        .then(() => true)
        .catch(err => { console.warn('Leaderboard push failed:', err); return false; });
    },
    // Subscribe to live updates for everyone in the group
    listen(groupCode, callback) {
      if (!lbConfigured) return;
      if (window.__lb.unsub) { window.__lb.unsub(); window.__lb.unsub = null; }
      const colRef = collection(lbDb, 'leaderboards', groupCode, 'members');
      window.__lb.unsub = onSnapshot(colRef, snap => {
        const members = [];
        snap.forEach(d => members.push(d.data()));
        callback(members);
      }, err => console.warn('Leaderboard listen failed:', err));
    },
    stop() { if (window.__lb.unsub) { window.__lb.unsub(); window.__lb.unsub = null; } }
  };
  // Let the rest of the app know Firebase is ready (it boots before this module resolves)
  window.dispatchEvent(new CustomEvent('lb-ready'));
</script>

<script>
function toggleSidebar(){
  const sb=document.querySelector('.sidebar');
  const ov=document.getElementById('sb-overlay');
  const mc=document.querySelector('.main-content');
  if(!sb)return;
  const isMobile=window.innerWidth<=768;
  if(isMobile){
    const open=sb.classList.toggle('sb-open');
    ov.classList.toggle('active',open);
    // Mirror the desktop pattern: a body class lets CSS reposition the
    // hamburger to align with the logo row while the drawer is open.
    document.body.classList.toggle('sidebar-open-mobile',open);
  } else {
    // Desktop: toggle hidden state — CSS handles sidebar transform + hamburger position
    document.body.classList.toggle('sidebar-hidden');
    const isHidden=document.body.classList.contains('sidebar-hidden');
    // Clear any inline styles so CSS classes take full control
    sb.style.transform='';
    mc.style.marginLeft=isHidden?'0':'220px';
  }
}
function closeSidebar(){
  const sb=document.querySelector('.sidebar');
  const ov=document.getElementById('sb-overlay');
  document.body.classList.remove('sidebar-open-mobile');
  if(sb)sb.classList.remove('sb-open');
  if(ov)ov.classList.remove('active');
}
// Close sidebar when a habit is toggled on mobile
document.addEventListener('click',e=>{
  if(e.target.closest('.check-card')&&window.innerWidth<=768)closeSidebar();
});
</script>

<script>
// ── SOUND SYSTEM ──────────────────────────────────────────────────────────
let _audioCtx=null;
function getAudioCtx(){
  if(!_audioCtx)_audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return _audioCtx;
}
function playSound(type){
  if(!load('ht2_sound',true))return;
  try{
    const ctx=getAudioCtx();
    const g=ctx.createGain();
    g.connect(ctx.destination);
    const now=ctx.currentTime;

    if(type==='check'){
      // Soft tick + tiny chime — habit checked
      const o=ctx.createOscillator();
      o.type='sine';o.frequency.setValueAtTime(880,now);
      o.frequency.exponentialRampToValueAtTime(1200,now+0.06);
      g.gain.setValueAtTime(0.08,now);
      g.gain.exponentialRampToValueAtTime(0.001,now+0.18);
      o.connect(g);o.start(now);o.stop(now+0.18);
    } else if(type==='uncheck'){
      const o=ctx.createOscillator();
      o.type='sine';o.frequency.setValueAtTime(600,now);
      o.frequency.exponentialRampToValueAtTime(400,now+0.1);
      g.gain.setValueAtTime(0.05,now);
      g.gain.exponentialRampToValueAtTime(0.001,now+0.12);
      o.connect(g);o.start(now);o.stop(now+0.12);
    } else if(type==='complete'){
      // Day 100% complete — gentle ascending chime
      [0,0.12,0.24,0.36].forEach((t,i)=>{
        const o=ctx.createOscillator();
        const gg=ctx.createGain();
        o.type='sine';
        o.frequency.setValueAtTime([523,659,784,1047][i],now+t);
        gg.gain.setValueAtTime(0.07,now+t);
        gg.gain.exponentialRampToValueAtTime(0.001,now+t+0.3);
        o.connect(gg);gg.connect(ctx.destination);
        o.start(now+t);o.stop(now+t+0.3);
      });
      return; // skip g cleanup
    } else if(type==='modal_open'){
      const o=ctx.createOscillator();
      o.type='sine';o.frequency.setValueAtTime(440,now);
      o.frequency.exponentialRampToValueAtTime(550,now+0.08);
      g.gain.setValueAtTime(0.04,now);
      g.gain.exponentialRampToValueAtTime(0.001,now+0.15);
      o.connect(g);o.start(now);o.stop(now+0.15);
    } else if(type==='modal_close'){
      const o=ctx.createOscillator();
      o.type='sine';o.frequency.setValueAtTime(550,now);
      o.frequency.exponentialRampToValueAtTime(380,now+0.1);
      g.gain.setValueAtTime(0.04,now);
      g.gain.exponentialRampToValueAtTime(0.001,now+0.12);
      o.connect(g);o.start(now);o.stop(now+0.12);
    } else if(type==='mood'){
      const o=ctx.createOscillator();
      o.type='triangle';o.frequency.setValueAtTime(700,now);
      g.gain.setValueAtTime(0.05,now);
      g.gain.exponentialRampToValueAtTime(0.001,now+0.1);
      o.connect(g);o.start(now);o.stop(now+0.1);
    } else if(type==='pip'){
      const o=ctx.createOscillator();
      o.type='sine';o.frequency.setValueAtTime(500,now);
      g.gain.setValueAtTime(0.04,now);
      g.gain.exponentialRampToValueAtTime(0.001,now+0.08);
      o.connect(g);o.start(now);o.stop(now+0.08);
    } else if(type==='add'){
      [0,0.1].forEach((t,i)=>{
        const o=ctx.createOscillator();
        const gg=ctx.createGain();
        o.type='sine';o.frequency.setValueAtTime([660,880][i],now+t);
        gg.gain.setValueAtTime(0.06,now+t);
        gg.gain.exponentialRampToValueAtTime(0.001,now+t+0.15);
        o.connect(gg);gg.connect(ctx.destination);
        o.start(now+t);o.stop(now+t+0.15);
      });
      return;
    }
  }catch(e){}
}

const WEEK_DAYS=['Su','Mo','Tu','We','Th','Fr','Sa'];
const WEEK_DAYS_FULL=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

// Default schedule = every day
function defaultSchedule(){return{type:'daily'}}

// Is this habit scheduled on a given date?
function isScheduled(habit, year, month, day){
  const s=habit.schedule||defaultSchedule();
  const date=new Date(year,month,day);
  const dow=date.getDay(); // 0=Sun
  if(s.type==='daily') return true;
  if(s.type==='specific') return (s.days||[]).includes(dow);
  if(s.type==='alternate'){
    // alternate: odd days=1,3,5... / even days=2,4,6...
    if(s.alt==='odd') return day%2===1;
    if(s.alt==='even') return day%2===0;
    return true;
  }
  if(s.type==='xweek'){
    // x times per week — treat as "scheduled every day", user just does it x times
    return true;
  }
  return true;
}

// Human-readable schedule label
function scheduleLabel(habit){
  const s=habit.schedule||defaultSchedule();
  if(s.type==='daily') return 'Every day';
  if(s.type==='specific'){
    const ds=s.days||[];
    if(!ds.length) return 'No days';
    return ds.map(d=>WEEK_DAYS[d]).join(' ');
  }
  if(s.type==='alternate') return s.alt==='odd'?'Alt · odd days':'Alt · even days';
  if(s.type==='xweek') return `${s.count||3}× / week`;
  return 'Every day';
}

// ── TIME WINDOW (optional, purely visual — never affects streak/score) ─────
// A habit can optionally carry {start:"HH:MM", end:"HH:MM"} on top of its
// existing day-schedule. It's just a nudge: "this is the slot for it today."
// Checking in early/late is always allowed and never penalized anywhere.
function hasTimeWindow(habit){
  return !!(habit.timeWindow && habit.timeWindow.start && habit.timeWindow.end);
}
function fmtTime12(hhmm){
  const [h,m]=hhmm.split(':').map(Number);
  const period=h>=12?'PM':'AM';
  const h12=h%12===0?12:h%12;
  return m===0?`${h12}${period}`:`${h12}:${String(m).padStart(2,'0')}${period}`;
}
function timeWindowLabel(habit){
  if(!hasTimeWindow(habit))return '';
  return `${fmtTime12(habit.timeWindow.start)}–${fmtTime12(habit.timeWindow.end)}`;
}
// Minutes since midnight, for easy comparison
function minutesNow(){const n=new Date();return n.getHours()*60+n.getMinutes();}
function minutesFromHHMM(hhmm){const [h,m]=hhmm.split(':').map(Number);return h*60+m;}
// Is right now inside this habit's window? Handles overnight windows
// (e.g. 22:00–06:00) by wrapping past midnight.
function isWithinTimeWindow(habit){
  if(!hasTimeWindow(habit))return false;
  const now=minutesNow();
  const start=minutesFromHHMM(habit.timeWindow.start);
  const end=minutesFromHHMM(habit.timeWindow.end);
  if(start===end)return false; // zero-length window, treat as no window
  if(start<end) return now>=start && now<end;
  return now>=start || now<end; // overnight wrap
}
// Has the window fully passed for today already? (purely for a quieter,
// non-alarming visual state — never blocks checking in)
function isPastTimeWindow(habit){
  if(!hasTimeWindow(habit))return false;
  const now=minutesNow();
  const end=minutesFromHHMM(habit.timeWindow.end);
  const start=minutesFromHHMM(habit.timeWindow.start);
  if(start<end) return now>=end;
  return false; // overnight windows don't get a "passed" dimming — too ambiguous
}

// ── HELPERS ────────────────────────────────────────────────────────────────
function daysInMonth(y,m){return new Date(y,m+1,0).getDate()}
function ck(hid,d){return `${state.year}-${state.month}-${hid}-${d}`}
function mk(d){return `${state.year}-${state.month}-${d}`}
function donePct(d){if(!state.habits.length)return 0;const done=state.habits.filter(h=>state.checks[ck(h.id,d)]).length;return Math.round(done/state.habits.length*100)}
function doneCount(d){return state.habits.filter(h=>state.checks[ck(h.id,d)]).length}

function habitStats(h){
  const days=daysInMonth(state.year,state.month);
  // Only count days where habit is scheduled
  let scheduledDays=0,done=0;
  for(let d=1;d<=days;d++){
    if(isScheduled(h,state.year,state.month,d)){
      scheduledDays++;
      if(state.checks[ck(h.id,d)])done++;
    }
  }
  let best=0,tmp=0,streak=0;
  for(let d=1;d<=days;d++){
    if(isScheduled(h,state.year,state.month,d)&&state.checks[ck(h.id,d)]){tmp++;if(tmp>best)best=tmp}
    else if(isScheduled(h,state.year,state.month,d)) tmp=0;
  }
  const t=new Date();
  if(t.getFullYear()===state.year&&t.getMonth()===state.month){
    for(let d=t.getDate();d>=1;d--){
      if(!isScheduled(h,state.year,state.month,d))continue;
      if(state.checks[ck(h.id,d)])streak++;else break;
    }
  }
  return{done,left:Math.max(0,scheduledDays-done),pct:scheduledDays?Math.round(done/scheduledDays*100):0,best,streak,scheduledDays};
}

function totalStats(){
  const days=daysInMonth(state.year,state.month);
  let goal=0,done=0;
  state.habits.forEach(hb=>{
    for(let d=1;d<=days;d++){
      if(isScheduled(hb,state.year,state.month,d)){
        goal++;
        if(state.checks[ck(hb.id,d)])done++;
      }
    }
  });
  return{goal,done,left:Math.max(0,goal-done),pct:goal?Math.round(done/goal*100):0};
}

// ── LEADERBOARD SCORE ENGINE ────────────────────────────────────────────────
// Scores are derived purely from heatmap intensity (0-5/day), the same metric
// already shown in the yearly heatmap. Nothing about *which* habits were done
// is used — just how dense/consistent the days were. This is what gets synced.
const LB_WINDOW=30; // rolling window the score/graph are based on

function dayLevel(year,month,day){
  if(!state.habits.length)return 0;
  let done=0;
  state.habits.forEach(hb=>{ if(state.checks[ck2(hb.id,year,month,day)]) done++; });
  const pct=done/state.habits.length;
  if(pct===0)return 0;
  if(pct<0.2)return 1;
  if(pct<0.4)return 2;
  if(pct<0.7)return 3;
  if(pct<1)return 4;
  return 5;
}
// ck() is scoped to state.year/state.month — this variant takes explicit y/m
// so the score engine can walk back across month boundaries.
function ck2(hid,y,m,d){return `${y}-${m}-${hid}-${d}`}

// Daily 0-5 levels for the last LB_WINDOW days, oldest first — this is what
// both the score AND the leaderboard graph are built from.
function recentLevels(){
  const today=new Date();
  const levels=[];
  for(let i=LB_WINDOW-1;i>=0;i--){
    const d=new Date(today); d.setDate(today.getDate()-i);
    levels.push(dayLevel(d.getFullYear(),d.getMonth(),d.getDate()));
  }
  return levels; // length LB_WINDOW, index 0 = oldest, last = today
}

// Rolling-window score — a single missed day only nudges the average down,
// it never zeroes out a streak multiplier. Missing today vs. missing two
// weeks ago has the same effect, which is the fair behavior we want for a
// friends leaderboard.
function computeScore(levels){
  levels = levels || recentLevels();
  let sum=0, goodDays=0;
  levels.forEach(lvl=>{ sum+=lvl; if(lvl>=3) goodDays++; });
  const avgLevel = sum/levels.length;            // 0-5
  const consistencyPct = Math.round((goodDays/levels.length)*100); // % of window that was "good" (lvl>=3)
  const score = Math.round(avgLevel*200);        // 0-1000 scale
  return {score, consistencyPct, avgLevel:+avgLevel.toFixed(2)};
}


// ── LEADERBOARD SYNC ─────────────────────────────────────────────────────────
// Only {username, avatar, score, consistencyPct, last-30-day levels} ever
// leave the device. Habit names, check-ins, and mood never touch Firebase —
// they stay in localStorage. The levels array is just numbers 0-5 per day,
// not tied to any habit name, so it carries no private info either.
function lbIsSetUp(){ return !!(state.lbUsername && state.lbGroupCode); }

function lbPushScore(){
  if(!lbIsSetUp() || !window.__lb || !window.__lb.configured) return;
  const levels=recentLevels();
  const {score,consistencyPct}=computeScore(levels);
  window.__lb.push(state.lbGroupCode, state.lbUsername, {
    username:state.lbUsername,
    avatar:state.lbAvatar,
    score, consistencyPct,
    levels, // 30 numbers, 0-5, oldest→newest — powers the comparison graph
  });
}

function toggleCheck(hid,d){

// ── VANILLA H ──────────────────────────────────────────────────────────────
function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on')&&typeof v==='function')el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className')el.className=v;
    else el.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null||c===false)return;
    el.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);
  });
  return el;
}

// ── CHECKLIST (today's habits) ──────────────────────────────────────────────
function buildChecklist(){
  const {year,month,habits,checks}=state;
  const today=new Date();
  const isCur=today.getFullYear()===year&&today.getMonth()===month;
  const targetDay=isCur?today.getDate():daysInMonth(year,month);
  const collapsed=state.collapsedSections['checklist'];

  const analysis=habits.map(h=>({...h,...habitStats(h)}));

  const grid=h('div',{className:'checklist-grid'},
    ...habits.map(hb=>{
      const k=ck(hb.id,targetDay);
      const done=!!checks[k];
      const scheduled=isScheduled(hb,year,month,targetDay);
      const st=analysis.find(a=>a.id===hb.id);
      // The live "do this now" highlight only ever applies to today's real
      // date — never to a past/future day you're just browsing.
      const isRealToday=isCur&&targetDay===today.getDate();
      const twActive=isRealToday&&hasTimeWindow(hb)&&isWithinTimeWindow(hb);
      const twPassedQuiet=isRealToday&&hasTimeWindow(hb)&&!done&&isPastTimeWindow(hb);
      const cardClasses='check-card'+(done?' done':'')+((!scheduled)?' habit-skipped':'')+(twActive?' tw-active':'')+(twPassedQuiet?' tw-passed':'');
      const twBadge=scheduled&&hasTimeWindow(hb)
        ? (twActive
            ? h('span',{className:'check-tw-badge'},'⏰ '+timeWindowLabel(hb))
            : twPassedQuiet
              ? h('span',{className:'check-tw-badge'},'✓ '+timeWindowLabel(hb))
              : h('span',{className:'check-tw-badge'},'🕓 '+timeWindowLabel(hb))
          )
        : null;
      const nowBadge=twActive&&!done?h('span',{className:'tw-now-badge'},'🔴 NOW'):null;
      const card=h('div',{className:cardClasses},
        h('div',{className:'check-icon'},done?'✓':(!scheduled?'–':'')),
        h('span',{className:'check-label'},hb.emoji+' '+hb.name),
        twBadge,
        nowBadge,
        !scheduled
          ? h('span',{style:{fontSize:'8px',color:'var(--text3)',flexShrink:'0'}},scheduleLabel(hb))
          : (st&&st.streak>1?h('span',{className:'check-streak'},'🔥'+st.streak):null)
      );
      if(scheduled) card.addEventListener('click',()=>toggleCheck(hb.id,targetDay));
      return card;
    })
  );

  const doneToday=habits.filter(hb=>!!checks[ck(hb.id,targetDay)]).length;
  const toggleBtn=h('button',{className:'section-toggle',onClick:()=>toggleSection('checklist')},collapsed?'▶ Show':'▼ Hide');

  return h('div',{className:'card widget'},
    h('div',{className:'card-title'},
      h('span',{className:'card-title-icon'},'✅'),
      isCur?`Today's Habits — Day ${targetDay}`:`${MONTHS[month]} ${targetDay} Habits`,
      h('span',{style:{marginLeft:'8px',background:'rgba(57,211,83,.15)',color:'#39d353',padding:'1px 7px',borderRadius:'10px',fontSize:'9px',fontWeight:'700'}},`${doneToday}/${habits.length}`),
      toggleBtn
    ),
    collapsed?null:grid
  );
}

// ── GITHUB-STYLE YEARLY HEATMAP ─────────────────────────────────────────────
function buildHeatmap(){
  const {habits,checks}=state;
  const curYear=state.year;
  const collapsed=state.collapsedSections['heatmap'];

  // Build 53 weeks of the year
  const jan1=new Date(curYear,0,1);
  const startDow=jan1.getDay(); // 0=Sun
  // We'll build from the first Sunday before/on Jan 1
  const startDate=new Date(jan1);
  startDate.setDate(jan1.getDate()-startDow);

  const weeks=[];
  const monthPositions={}; // week index -> month label
  let d=new Date(startDate);
  for(let w=0;w<53;w++){
    const week=[];
    for(let day=0;day<7;day++){
      const dd=new Date(d);
      week.push(dd);
      if(day===0&&dd.getFullYear()===curYear){
        const m=dd.getMonth();
        if(!monthPositions[m]||monthPositions[m]>w)monthPositions[m]=w;
      }
      d.setDate(d.getDate()+1);
    }
    weeks.push(week);
  }

  // Count completions per date — highly reactive: every habit change shifts intensity
  function getLevel(date){
    if(date.getFullYear()!==curYear)return 0;
    const y=date.getFullYear(),m=date.getMonth(),day=date.getDate();
    if(!habits.length)return 0;
    let done=0;
    habits.forEach(hb=>{
      const k=`${y}-${m}-${hb.id}-${day}`;
      if(checks[k])done++;
    });
    if(done===0)return 0;
    const n=habits.length;
    // Each completed habit shifts the level noticeably
    // With 1 habit: always level 1+; scale linearly but cap at 5
    const pct=done/n;
    if(done===1&&n>1)return 1;         // single habit → lowest visible
    if(pct<=0.25)return 1;
    if(pct<=0.5)return 2;
    if(pct<=0.75)return 3;
    if(pct<1)return 4;
    return 5;                           // 100% → max glow
  }

  const tooltip=document.getElementById('heat-tooltip');

  // Month labels row
  const monthLabelsWrap=h('div',{style:{display:'flex',marginLeft:'28px',marginBottom:'4px',position:'relative',height:'14px'}});
  Object.entries(monthPositions).forEach(([m,wi])=>{
    const lbl=h('span',{style:{position:'absolute',left:(wi*14)+'px',fontSize:'9px',color:'#8b949e',fontWeight:'500',whiteSpace:'nowrap'}},MONTHS_SHORT[m]);
    monthLabelsWrap.appendChild(lbl);
  });

  // Day labels (Mon, Wed, Fri)

  });

  // Weeks
  const weeksWrap=h('div',{style:{display:'flex',gap:'3px'}});
  weeks.forEach(week=>{

// ── RADAR / SPIDER CHART ───────────────────────────────────────────────────
function buildRadar(){
  const {habits}=state;
  const collapsed=state.collapsedSections['radar'];

  const analysis=habits.map(h=>({...h,...habitStats(h)}));
  if(!analysis.length){
    return h('div',{className:'card widget'},
      h('div',{className:'card-title'},h('span',{className:'card-title-icon'},'🕸'),'Performance Radar'),
      h('div',{style:{textAlign:'center',color:'var(--text3)',fontSize:'11px',padding:'20px'}},'Add habits to see radar chart')
    );
  }

  // Take up to 8 habits for radar axes
  const axes=analysis.slice(0,8);
  const n=axes.length;
  const cx=160,cy=160,R=120;
  const rings=5; // concentric rings

  const svgNS='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(svgNS,'svg');
  svg.setAttribute('viewBox','0 0 320 320');
  svg.setAttribute('width','100%');
  svg.setAttribute('style','max-width:320px;overflow:visible');
  svg.setAttribute('class','radar-svg');

  // Helper: angle for axis i (start top, clockwise)
  const angle=i=>(i*2*Math.PI/n)-Math.PI/2;

  // Draw concentric rings (polygons)
  for(let ring=rings;ring>=1;ring--){
    const frac=ring/rings;
    const pts=axes.map((_,i)=>{
      const a=angle(i);
      return `${cx+R*frac*Math.cos(a)},${cy+R*frac*Math.sin(a)}`;
    }).join(' ');
    const poly=document.createElementNS(svgNS,'polygon');
    poly.setAttribute('points',pts);
    poly.setAttribute('fill','none');
    poly.setAttribute('stroke',ring===rings?'#30363d':'#21262d');
    poly.setAttribute('stroke-width','1');
    svg.appendChild(poly);
    // Ring label (percent)
    const labelA=angle(0);
    const lx=cx+R*frac*Math.cos(labelA)+3;
    const ly=cy+R*frac*Math.sin(labelA);
    const lbl=document.createElementNS(svgNS,'text');
    lbl.setAttribute('x',lx);lbl.setAttribute('y',ly);
    lbl.setAttribute('fill','#6e7681');lbl.setAttribute('font-size','10');
    lbl.setAttribute('text-anchor','start');
    lbl.textContent=(ring*20)+'%';
    svg.appendChild(lbl);
  }

  // Axis lines
  axes.forEach((_,i)=>{
    const a=angle(i);
    const line=document.createElementNS(svgNS,'line');
    line.setAttribute('x1',cx);line.setAttribute('y1',cy);
    line.setAttribute('x2',cx+R*Math.cos(a));line.setAttribute('y2',cy+R*Math.sin(a));
    line.setAttribute('stroke','#30363d');line.setAttribute('stroke-width','1');
    svg.appendChild(line);
  });

  // Data polygon — multiple levels (current pct)
  // Draw filled area
  const dataPts=axes.map((h,i)=>{
    const frac=h.pct/100;
    const a=angle(i);
    return `${cx+R*frac*Math.cos(a)},${cy+R*frac*Math.sin(a)}`;
  }).join(' ');
  const dataPoly=document.createElementNS(svgNS,'polygon');
  dataPoly.setAttribute('points',dataPts);
  dataPoly.setAttribute('fill','rgba(57,211,83,.15)');
  dataPoly.setAttribute('stroke','#39d353');
  dataPoly.setAttribute('stroke-width','1.5');
  dataPoly.setAttribute('stroke-linejoin','round');
  svg.appendChild(dataPoly);

  // Data points & glow
  axes.forEach((hab,i)=>{
    const frac=hab.pct/100;
    const a=angle(i);
    const px=cx+R*frac*Math.cos(a);
    const py=cy+R*frac*Math.sin(a);

    // Glow circle
    const glow=document.createElementNS(svgNS,'circle');
    glow.setAttribute('cx',px);glow.setAttribute('cy',py);glow.setAttribute('r','5');
    glow.setAttribute('fill',hab.color||'#39d353');glow.setAttribute('opacity','.25');
    svg.appendChild(glow);

    const dot=document.createElementNS(svgNS,'circle');
    dot.setAttribute('cx',px);dot.setAttribute('cy',py);dot.setAttribute('r','3');
    dot.setAttribute('fill',hab.color||'#39d353');
    svg.appendChild(dot);

    // Axis labels
    const labelFrac=1.2;
    const lx=cx+R*labelFrac*Math.cos(a);
    const ly=cy+R*labelFrac*Math.sin(a);
    const anchor=Math.abs(Math.cos(a))<0.1?'middle':Math.cos(a)>0?'start':'end';
    const labelText=document.createElementNS(svgNS,'text');
    labelText.setAttribute('x',lx);labelText.setAttribute('y',ly+4);
    labelText.setAttribute('fill','#8b949e');labelText.setAttribute('font-size','11');
    labelText.setAttribute('text-anchor',anchor);
    labelText.setAttribute('font-family','Inter,sans-serif');
    labelText.setAttribute('font-weight','500');
    labelText.textContent=hab.emoji+' '+hab.pct+'%';
    svg.appendChild(labelText);
  });

  // Center dot
  const cDot=document.createElementNS(svgNS,'circle');
  cDot.setAttribute('cx',cx);cDot.setAttribute('cy',cy);cDot.setAttribute('r','3');
  cDot.setAttribute('fill','#39d353');
  svg.appendChild(cDot);

  const toggleBtn=h('button',{className:'section-toggle',onClick:()=>toggleSection('radar')},collapsed?'▶ Show':'▼ Hide');

  return h('div',{className:'card widget'},
    h('div',{className:'card-title'},
      h('span',{className:'card-title-icon'},'🕸'),
      'Performance Radar',
      toggleBtn
    ),
    collapsed?null:h('div',{className:'radar-container'},
      svg,
      h('div',{style:{fontSize:'9px',color:'var(--text3)',textAlign:'center'}},'Each axis = habit completion % this month')
    )
  );
}

  if(!collapsed){
    const scrollWrap=document.createElement('div');
    scrollWrap.style.cssText='max-height:200px;overflow-y:auto;padding-right:4px;scroll-behavior:smooth';
    let todayRow=null;

    allDays.forEach(d=>{
      const pct=donePct(d);
      const isToday=new Date().getDate()===d&&new Date().getMonth()===month&&new Date().getFullYear()===year;
      const row=document.createElement('div');
      row.className='daily-bar-wrap';
      if(isToday) row.style.cssText='scroll-margin-top:4px';

      label.className='daily-bar-label';
      label.style.color=isToday?'#39d353':'var(--text3)';
      if(isToday) label.style.fontWeight='700';
      label.textContent=String(d).padStart(2,'0');

      const bg=document.createElement('div');bg.className='daily-bar-bg';
      const fill=document.createElement('div');
      fill.className='daily-bar-fill';
      fill.style.width=pct+'%';
      fill.style.background=pct===100?'#39d353':pct>50?'#26a641':'#196127';
      bg.appendChild(fill);

      const pctEl=document.createElement('div');
      pctEl.className='daily-bar-pct';
      pctEl.textContent=pct?pct+'%':'';

      row.appendChild(label);row.appendChild(bg);row.appendChild(pctEl);
      scrollWrap.appendChild(row);
      if(isToday) todayRow=row;
    });

    card.appendChild(scrollWrap);

    // Auto-scroll to today's row after mount
    if(todayRow){
      requestAnimationFrame(()=>{
        requestAnimationFrame(()=>{
          const rowTop=todayRow.offsetTop;
          const wrapH=scrollWrap.offsetHeight;
          const rowH=todayRow.offsetHeight;
          scrollWrap.scrollTop=rowTop-(wrapH/2)+(rowH/2);
        });
      });
    }
  }

  return card;
}

const LB_FRIEND_COLORS=['#58a6ff','#bc8cff','#f0883e','#f85149','#e3b341','#39d353','#ff6eb4','#66e0ff'];

// Builds the SVG polyline graph comparing everyone's last-30-day levels (0-5)
function buildLbGraph(myEntry,others){
  const W=560,H=140,padL=4,padR=4,padT=10,padB=10;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const n=LB_WINDOW;
  const xFor=i=>padL+(i/(n-1))*plotW;
  const yFor=lvl=>padT+plotH-(lvl/5)*plotH;

  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.setAttribute('width','100%');
  svg.style.display='block';
  svg.style.overflow='visible';

  // Horizontal gridlines at levels 0/2.5/5
  [0,2.5,5].forEach(lvl=>{
    const ly=yFor(lvl);
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',padL);line.setAttribute('x2',W-padR);
    line.setAttribute('y1',ly);line.setAttribute('y2',ly);
    line.setAttribute('stroke','var(--border)');line.setAttribute('stroke-width','1');
    line.setAttribute('stroke-dasharray','3,3');
    svg.appendChild(line);
  });

  function drawLine(levels,color,opacity,widthPx,glow){
    const pts=levels.map((lvl,i)=>`${xFor(i)},${yFor(lvl)}`).join(' ');
    const poly=document.createElementNS('http://www.w3.org/2000/svg','polyline');
    poly.setAttribute('points',pts);
    poly.setAttribute('fill','none');
    poly.setAttribute('stroke',color);
    poly.setAttribute('stroke-width',widthPx);
    poly.setAttribute('stroke-linejoin','round');
    poly.setAttribute('stroke-linecap','round');
    poly.setAttribute('opacity',opacity);
    if(glow)poly.style.filter=`drop-shadow(0 0 4px ${color})`;
    svg.appendChild(poly);
    // dot on the last (today) point
    const last=levels[levels.length-1];
    const dot=document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('cx',xFor(levels.length-1));dot.setAttribute('cy',yFor(last));
    dot.setAttribute('r',widthPx+1.2);
    dot.setAttribute('fill',color);
    dot.setAttribute('opacity',opacity);
    svg.appendChild(dot);
  }

  // Friends first (dim, behind), me on top (bright)
  others.forEach(o=>{
    if(!o.levels||!o.levels.length)return;
    drawLine(o.levels,lbColorFor(o.username,others),0.45,1.6,false);
  });
  drawLine(myEntry.levels,'#39d353',1,2.6,true);

  return svg;
}

function buildMoodSparkline(allDays,mood,motiv){
  const W=100,H=36,pad=4;
  const moodPts=allDays.map(d=>mood[mk(d)]||0);
  const motivPts=allDays.map(d=>motiv[mk(d)]||0);
  const n=allDays.length;
  if(n<2)return null;

  function pts(arr,color){
    const coords=arr.map((v,i)=>{
      const x=pad+(i/(n-1))*(W-pad*2);
      const y=H-pad-(v/10)*(H-pad*2);
      return `${x},${y}`;
    }).join(' ');
    const line=document.createElementNS('http://www.w3.org/2000/svg','polyline');
    line.setAttribute('points',coords);
    line.setAttribute('fill','none');
    line.setAttribute('stroke',color);
    line.setAttribute('stroke-width','0.8');
    line.setAttribute('stroke-linecap','round');
    line.setAttribute('stroke-linejoin','round');
    line.setAttribute('opacity','.9');
    return line;
  }

  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.setAttribute('preserveAspectRatio','none');
  svg.className='mood-sparkline-svg';

  // Grid lines at 25%, 50%, 75%
  [2.5,5,7.5].forEach(v=>{
    const y=H-pad-(v/10)*(H-pad*2);
    const gl=document.createElementNS('http://www.w3.org/2000/svg','line');
    gl.setAttribute('x1',pad);gl.setAttribute('x2',W-pad);
    gl.setAttribute('y1',y);gl.setAttribute('y2',y);
    gl.setAttribute('stroke','#30363d');gl.setAttribute('stroke-width','0.4');
    svg.appendChild(gl);
  });

  svg.appendChild(pts(moodPts,'#f0883e'));
  svg.appendChild(pts(motivPts,'#58a6ff'));

  // Dots for today
  const todayIdx=allDays.length-1;
  [{arr:moodPts,c:'#f0883e'},{arr:motivPts,c:'#58a6ff'}].forEach(({arr,c})=>{
    if(!arr[todayIdx])return;
    const x=pad+(todayIdx/(n-1))*(W-pad*2);
    const y=H-pad-(arr[todayIdx]/10)*(H-pad*2);
    const dot=document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('cx',x);dot.setAttribute('cy',y);dot.setAttribute('r','1.8');
    dot.setAttribute('fill',c);svg.appendChild(dot);
  });

  return h('div',{className:'mood-sparkline-wrap'},
    h('div',{className:'mood-sparkline-labels'},
      h('span',null,`${MONTHS_SHORT[state.month]} 1`),
      h('span',null,'Today')
    ),
    svg,
    h('div',{className:'mood-legend'},
      h('span',null,h('span',{className:'mood-legend-dot',style:{background:'#f0883e'}},' '),' Mood'),
      h('span',null,h('span',{className:'mood-legend-dot',style:{background:'#58a6ff'}},' '),' Energy')
    )
  );
}

function positionPopup(popup,triggerEl){
  // Force display so we can measure real dimensions (display:none = 0x0)
  popup.style.display='flex';
  popup.style.visibility='hidden';
  popup.style.position='fixed';
  popup.style.left='-9999px';
  popup.style.top='0';
  document.body.appendChild(popup);
  // Now offsetWidth/offsetHeight are real
  const pw=popup.offsetWidth;
  const ph=popup.offsetHeight;
  const tr=triggerEl.getBoundingClientRect();
  const vw=window.innerWidth,vh=window.innerHeight;
  // Prefer above the trigger, fall back to below
  let top=tr.top-ph-10;
  if(top<8)top=tr.bottom+8;
  // Center horizontally on trigger
  let left=tr.left+tr.width/2-pw/2;
  // Hard clamp to viewport with 8px margin on all sides
  top=Math.max(8,Math.min(top,vh-ph-8));
  left=Math.max(8,Math.min(left,vw-pw-8));
  popup.style.left=left+'px';
  popup.style.top=top+'px';
  popup.style.display='';
  popup.style.visibility='';
  requestAnimationFrame(()=>popup.classList.add('visible'));
}

function buildMoodSection(){
  const {year,month,mood,motiv}=state;
  const days=daysInMonth(year,month);
  const today=new Date();
  const isCur=today.getFullYear()===year&&today.getMonth()===month;
  const maxDay=isCur?today.getDate():days;
  const allDays=Array.from({length:maxDay},(_,i)=>i+1);
  const collapsed=state.collapsedSections['mood'];
  const toggleBtn=h('button',{className:'section-toggle',onClick:()=>toggleSection('mood')},collapsed?'▶ Show':'▼ Hide');
  const notes=load('ht2_notes',{});

  // Avg mood + energy for summary
  const moodVals=allDays.map(d=>mood[mk(d)]).filter(Boolean);
  const motivVals=allDays.map(d=>motiv[mk(d)]).filter(Boolean);
  const avgMood=moodVals.length?Math.round(moodVals.reduce((a,b)=>a+b,0)/moodVals.length*10)/10:null;
  const avgEnergy=motivVals.length?Math.round(motivVals.reduce((a,b)=>a+b,0)/motivVals.length*10)/10:null;

  const cardEl=h('div',{className:'card widget'},
    h('div',{className:'card-title'},
      h('span',{className:'card-title-icon'},'🧠'),
      'Mood & Motivation',
      avgMood?h('span',{style:{marginLeft:'8px',fontSize:'9px',color:'var(--orange)',fontWeight:'700'}},`avg ${MOOD_EMOJIS[moodScoreToEmoji(avgMood)]} ${avgMood}`):null,
      avgEnergy?h('span',{style:{marginLeft:'6px',fontSize:'9px',color:'var(--blue)',fontWeight:'700'}},`⚡${avgEnergy}`):null,
      toggleBtn
    )
  );

  if(!collapsed){
    const wrap=document.createElement('div');

    // Sparkline
    if(allDays.length>=2){const sl=buildMoodSparkline(allDays,mood,motiv);if(sl)wrap.appendChild(sl);}

    // Hint
    const hint=document.createElement('div');
    hint.style.cssText='display:flex;gap:8px;margin-bottom:10px;font-size:9px;color:var(--text3);align-items:center;flex-wrap:wrap';
    hint.innerHTML='<span>😊 tap to set mood</span><span>·</span><span>⚡ tap to set energy</span><span>·</span><span>📝 tap to add note</span>'+(isCur?'<span style="margin-left:auto;background:rgba(57,211,83,.1);border:1px solid rgba(57,211,83,.25);color:var(--green);border-radius:10px;padding:1px 7px;font-size:8px;font-weight:700">Today only</span>':'');
    wrap.appendChild(hint);

    // Strip
    const strip=document.createElement('div');
    strip.className='mood-week-strip';
    let todayCardEl=null;

    allDays.forEach(d=>{
      const k=mk(d);
      const moodScore=mood[k]||0;
      const energyLevel=motiv[k]||0;
      const emojiIdx=moodScore?moodScoreToEmoji(moodScore):null;
      const isToday=isCur&&d===today.getDate();
      const isPast=isCur?d<today.getDate():true;
      const noteKey=`${year}-${month}-${d}`;
      const noteVal=notes[noteKey]||'';
      const pipCount=5;
      const pipLevel=Math.round((energyLevel/10)*pipCount);

      const currentEmoji=emojiIdx!==null?MOOD_EMOJIS[emojiIdx]:'😶';
      const moodTrig=document.createElement('button');
      moodTrig.className='mood-trigger'+(emojiIdx!==null?' picked':'');
      moodTrig.title=isToday?(emojiIdx!==null?MOOD_LABELS[emojiIdx]:'Set mood'):'Past days are locked';
      moodTrig.textContent=currentEmoji;
      if(isToday) moodTrig.addEventListener('click',e=>{e.stopPropagation();openMoodPopup(moodTrig,d,emojiIdx);});

      const energyTrig=document.createElement('button');
      energyTrig.className='energy-trigger'+(energyLevel>0?' has-energy':'');
      energyTrig.title=isToday?'Set energy level':'Past days are locked';
      const energyLabel=document.createElement('span');
      energyLabel.className='energy-trigger-label';energyLabel.textContent='Energy';
      const miniBars=document.createElement('div');
      miniBars.className='energy-mini-bars';
      const barHeights=[8,10,12,14,16];
      Array.from({length:pipCount},(_,i)=>{
        const b=document.createElement('div');
        b.className='energy-mini-bar'+(i<pipLevel?' lit':'');
        b.style.height=barHeights[i]+'px';
        miniBars.appendChild(b);
      });
      energyTrig.appendChild(energyLabel);
      energyTrig.appendChild(miniBars);
      if(isToday) energyTrig.addEventListener('click',e=>{e.stopPropagation();openEnergyPopup(energyTrig,d,energyLevel);});

      const noteTrig=document.createElement('button');
      noteTrig.className='note-trigger'+(noteVal?' has-note':'');
      noteTrig.title=isToday?(noteVal?'Edit note':'Add note'):'Past days are locked';
      noteTrig.innerHTML='<span>📝</span><span class="note-trigger-text">note</span>';
      if(isToday) noteTrig.addEventListener('click',e=>{e.stopPropagation();openNoteModal(d,noteKey,noteVal);});

      const card=document.createElement('div');
      card.className='mood-day-card'+(isToday?' today-card':isPast?' past-card':'');
      const dayNum=document.createElement('div');
      dayNum.className='mood-day-num';
      dayNum.textContent=MONTHS_SHORT[month]+' '+String(d).padStart(2,'0');
      card.appendChild(dayNum);
      card.appendChild(moodTrig);
      card.appendChild(energyTrig);
      card.appendChild(noteTrig);

      if(isToday) todayCardEl=card;
      strip.appendChild(card);
    });

    wrap.appendChild(strip);

    if(todayCardEl){
      requestAnimationFrame(()=>{
        requestAnimationFrame(()=>{
          const cardLeft=todayCardEl.offsetLeft;
          const stripW=strip.offsetWidth;
          const cardW=todayCardEl.offsetWidth;
          strip.scrollLeft=cardLeft-(stripW/2)+(cardW/2);
        });
      });
    }

    cardEl.appendChild(wrap);
  }

  return cardEl;
}

function buildModal(){

  const catSel=h('select',{},

  const typeRow=h('div',{className:'sched-type-row'},

        btn.addEventListener('click',()=>{
          const cur=fs.days||[];
