function buildMoodSparkline(allDays,mood,motiv){
  const W=100,H=36,pad=4;
  const moodPts=allDays.map(d=>mood[mk(d)]||0);
  const motivPts=allDays.map(d=>motiv[mk(d)]||0);
  const n=allDays.length;
  if(n<2)return null;

  function pts(arr,color){
    const coords=arr.map((v,i)=>{
      const x=pad+(i/(n-1))*(W-pad*2);
      const y=H-pad-(v/10)*(H-pad*2);
      return `${x},${y}`;
    }).join(' ');
    const line=document.createElementNS('http://www.w3.org/2000/svg','polyline');
    line.setAttribute('points',coords);
    line.setAttribute('fill','none');
    line.setAttribute('stroke',color);
    line.setAttribute('stroke-width','0.8');
    line.setAttribute('stroke-linecap','round');
    line.setAttribute('stroke-linejoin','round');
    line.setAttribute('opacity','.9');
    return line;
  }

  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.setAttribute('preserveAspectRatio','none');
  svg.className='mood-sparkline-svg';

  // Grid lines at 25%, 50%, 75%
  [2.5,5,7.5].forEach(v=>{
    const y=H-pad-(v/10)*(H-pad*2);
    const gl=document.createElementNS('http://www.w3.org/2000/svg','line');
    gl.setAttribute('x1',pad);gl.setAttribute('x2',W-pad);
    gl.setAttribute('y1',y);gl.setAttribute('y2',y);
    gl.setAttribute('stroke','#30363d');gl.setAttribute('stroke-width','0.4');
    svg.appendChild(gl);
  });

  svg.appendChild(pts(moodPts,'#f0883e'));
  svg.appendChild(pts(motivPts,'#58a6ff'));

  // Dots for today
  const todayIdx=allDays.length-1;
  [{arr:moodPts,c:'#f0883e'},{arr:motivPts,c:'#58a6ff'}].forEach(({arr,c})=>{
    if(!arr[todayIdx])return;
    const x=pad+(todayIdx/(n-1))*(W-pad*2);
    const y=H-pad-(arr[todayIdx]/10)*(H-pad*2);
    const dot=document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('cx',x);dot.setAttribute('cy',y);dot.setAttribute('r','1.8');
    dot.setAttribute('fill',c);svg.appendChild(dot);
  });

  return h('div',{className:'mood-sparkline-wrap'},
    h('div',{className:'mood-sparkline-labels'},
      h('span',null,`${MONTHS_SHORT[state.month]} 1`),
      h('span',null,'Today')
    ),
    svg,
    h('div',{className:'mood-legend'},
      h('span',null,h('span',{className:'mood-legend-dot',style:{background:'#f0883e'}},' '),' Mood'),
      h('span',null,h('span',{className:'mood-legend-dot',style:{background:'#58a6ff'}},' '),' Energy')
    )
  );
}

function positionPopup(popup,triggerEl){
  // Force display so we can measure real dimensions (display:none = 0x0)
  popup.style.display='flex';
  popup.style.visibility='hidden';
  popup.style.position='fixed';
  popup.style.left='-9999px';
  popup.style.top='0';
  document.body.appendChild(popup);
  // Now offsetWidth/offsetHeight are real
  const pw=popup.offsetWidth;
  const ph=popup.offsetHeight;
  const tr=triggerEl.getBoundingClientRect();
  const vw=window.innerWidth,vh=window.innerHeight;
  // Prefer above the trigger, fall back to below
  let top=tr.top-ph-10;
  if(top<8)top=tr.bottom+8;
  // Center horizontally on trigger
  let left=tr.left+tr.width/2-pw/2;
  // Hard clamp to viewport with 8px margin on all sides
  top=Math.max(8,Math.min(top,vh-ph-8));
  left=Math.max(8,Math.min(left,vw-pw-8));
  popup.style.left=left+'px';
  popup.style.top=top+'px';
  popup.style.display='';
  popup.style.visibility='';
  requestAnimationFrame(()=>popup.classList.add('visible'));
}

    hint.style.cssText='display:flex;gap:8px;margin-bottom:10px;font-size:9px;color:var(--text3);align-items:center;flex-wrap:wrap';
    hint.innerHTML='<span>😊 tap to set mood</span><span>·</span><span>⚡ tap to set energy</span><span>·</span><span>📝 tap to add note</span>'+(isCur?'<span style="margin-left:auto;background:rgba(57,211,83,.1);border:1px solid rgba(57,211,83,.25);color:var(--green);border-radius:10px;padding:1px 7px;font-size:8px;font-weight:700">Today only</span>':'');
    wrap.appendChild(hint);

    // Strip
    const strip=document.createElement('div');
    strip.className='mood-week-strip';
    let todayCardEl=null;

    allDays.forEach(d=>{
      const k=mk(d);
      const moodScore=mood[k]||0;
      const energyLevel=motiv[k]||0;
      const emojiIdx=moodScore?moodScoreToEmoji(moodScore):null;
      const isToday=isCur&&d===today.getDate();
      const isPast=isCur?d<today.getDate():true;
      const noteKey=`${year}-${month}-${d}`;
      const noteVal=notes[noteKey]||'';
      const pipCount=5;
      const pipLevel=Math.round((energyLevel/10)*pipCount);

      const currentEmoji=emojiIdx!==null?MOOD_EMOJIS[emojiIdx]:'😶';
      const moodTrig=document.createElement('button');
      moodTrig.className='mood-trigger'+(emojiIdx!==null?' picked':'');
      moodTrig.title=isToday?(emojiIdx!==null?MOOD_LABELS[emojiIdx]:'Set mood'):'Past days are locked';
      moodTrig.textContent=currentEmoji;
      if(isToday) moodTrig.addEventListener('click',e=>{e.stopPropagation();openMoodPopup(moodTrig,d,emojiIdx);});

      const energyTrig=document.createElement('button');
      energyTrig.className='energy-trigger'+(energyLevel>0?' has-energy':'');
      energyTrig.title=isToday?'Set energy level':'Past days are locked';
      const energyLabel=document.createElement('span');
      energyLabel.className='energy-trigger-label';energyLabel.textContent='Energy';
      const miniBars=document.createElement('div');
      miniBars.className='energy-mini-bars';
      const barHeights=[8,10,12,14,16];
      Array.from({length:pipCount},(_,i)=>{
        const b=document.createElement('div');
        b.className='energy-mini-bar'+(i<pipLevel?' lit':'');
        b.style.height=barHeights[i]+'px';
        miniBars.appendChild(b);
      });
      energyTrig.appendChild(energyLabel);
      energyTrig.appendChild(miniBars);
      if(isToday) energyTrig.addEventListener('click',e=>{e.stopPropagation();openEnergyPopup(energyTrig,d,energyLevel);});

      const noteTrig=document.createElement('button');
      noteTrig.className='note-trigger'+(noteVal?' has-note':'');
      noteTrig.title=isToday?(noteVal?'Edit note':'Add note'):'Past days are locked';
      noteTrig.innerHTML='<span>📝</span><span class="note-trigger-text">note</span>';
      if(isToday) noteTrig.addEventListener('click',e=>{e.stopPropagation();openNoteModal(d,noteKey,noteVal);});

      const card=document.createElement('div');
      card.className='mood-day-card'+(isToday?' today-card':isPast?' past-card':'');
      const dayNum=document.createElement('div');
      dayNum.className='mood-day-num';
      dayNum.textContent=MONTHS_SHORT[month]+' '+String(d).padStart(2,'0');
      card.appendChild(dayNum);
      card.appendChild(moodTrig);
      card.appendChild(energyTrig);
      card.appendChild(noteTrig);

      if(isToday) todayCardEl=card;
      strip.appendChild(card);
    });

    wrap.appendChild(strip);

    if(todayCardEl){
      requestAnimationFrame(()=>{
        requestAnimationFrame(()=>{
          const cardLeft=todayCardEl.offsetLeft;
          const stripW=strip.offsetWidth;
          const cardW=todayCardEl.offsetWidth;
          strip.scrollLeft=cardLeft-(stripW/2)+(cardW/2);
        });
      });
    }

    cardEl.appendChild(wrap);
  }

  return cardEl;
}

// ── MODAL ─────────────────────────────────────────────────────────────────
function buildModal(){
  const isEdit=state.modal==='edit';

  if(state.modal==='reset'){
    setTimeout(()=>setState({modal:null}),0);
    return null;
  }
  const overlay=h('div',{className:'overlay'});
  overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal()});

  const nameInput=h('input',{type:'text',placeholder:'e.g. Run 5km',value:state.formName});
  nameInput.addEventListener('input',e=>state.formName=e.target.value);
  nameInput.addEventListener('keydown',e=>{if(e.key==='Enter')saveHabit();if(e.key==='Escape')closeModal()});

  const catSel=h('select',{},
    ...CATS.map(c=>Object.assign(document.createElement('option'),{value:c,textContent:c,selected:c===state.formCat}))
  );
  catSel.addEventListener('change',e=>state.formCat=e.target.value);

  // ── EMOJI GRID — no render(), update in place ──────────────────────────
  const emojiGrid=h('div',{className:'eg'},
    ...EMOJIS.map(e=>{
      const span=h('span',{className:'eo'+(state.formEmoji===e?' sel-e':'')},e);
      span.addEventListener('click',()=>{
        state.formEmoji=e;
        // just swap selected class, no re-render
        emojiGrid.querySelectorAll('.eo').forEach(s=>s.classList.remove('sel-e'));
        span.classList.add('sel-e');
      });
      return span;
    })
  );

  // ── COLOR ROW — no render(), update in place ───────────────────────────
  const colorRow=h('div',{className:'cr'},
    ...COLORS.map(c=>{
      const d=h('div',{className:'co'+(state.formColor===c?' sel-c':''),style:{background:c}});
      d.addEventListener('click',()=>{
        state.formColor=c;
        colorRow.querySelectorAll('.co').forEach(el=>el.classList.remove('sel-c'));
        d.classList.add('sel-c');
      });
      return d;
    })
  );

  // ── SCHEDULE BUILDER — swap content in place, never full re-render ──────
  const fs=state.formSchedule;
  const schedTypes=[{t:'daily',label:'Every Day'},{t:'specific',label:'Specific Days'},{t:'alternate',label:'Alternating'},{t:'xweek',label:'X / Week'}];

  // Container for the extra schedule options (days/alt/count)
  const schedExtraWrap=document.createElement('div');

  function buildSchedExtra(currentFs){
    schedExtraWrap.innerHTML='';
    if(currentFs.type==='specific'){
      const row=h('div',{className:'sched-days-row'},
        ...WEEK_DAYS.map((d,i)=>{
          const active=(currentFs.days||[]).includes(i);
          const btn=h('button',{className:'sched-day-btn'+(active?' active':'')},d);
          btn.addEventListener('click',()=>{
            const cur=state.formSchedule.days||[];
            const isActive=cur.includes(i);
            state.formSchedule={...state.formSchedule,days:isActive?cur.filter(x=>x!==i):[...cur,i].sort((a,b)=>a-b)};
            btn.classList.toggle('active',!isActive);
            // rebuild just the days row
            buildSchedExtra(state.formSchedule);
          });
          return btn;
        })
      );
      schedExtraWrap.appendChild(row);
    } else if(currentFs.type==='alternate'){
      const row=h('div',{className:'sched-alt-row'},
        ...([{v:'odd',label:'Odd Days  (1,3,5…)'},{v:'even',label:'Even Days  (2,4,6…)'}]).map(({v,label})=>{
          const btn=h('button',{className:'sched-alt-btn'+(currentFs.alt===v?' active':'')},label);
          btn.addEventListener('click',()=>{
            state.formSchedule={...state.formSchedule,alt:v};
            buildSchedExtra(state.formSchedule);
          });
          return btn;
        })
      );
      schedExtraWrap.appendChild(row);
    } else if(currentFs.type==='xweek'){
      const inp=h('input',{className:'sched-xweek-input',type:'number',min:'1',max:'7',value:currentFs.count||3});
      inp.addEventListener('change',e=>state.formSchedule={...state.formSchedule,count:Math.min(7,Math.max(1,parseInt(e.target.value)||1))});
      schedExtraWrap.appendChild(h('div',{className:'sched-xweek-row'},
        inp,
        h('span',{style:{fontSize:'11px',color:'var(--text2)'}},'times per week (any days)')
      ));
    }
  }
  buildSchedExtra(fs);

  const typeRow=h('div',{className:'sched-type-row'},
    ...schedTypes.map(({t,label})=>{
      const btn=h('button',{className:'sched-type-btn'+(fs.type===t?' active':'')},label);
      btn.addEventListener('click',()=>{
        state.formSchedule={type:t,days:[],alt:'odd',count:3};
        // swap active class only
        typeRow.querySelectorAll('.sched-type-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        buildSchedExtra(state.formSchedule);
      });
      return btn;
    })
  );

  // ── TIME WINDOW — update timeline in place, no re-render ──────────────
  const tw=state.formTimeWindow;

  const twOff=h('div',{className:'tw-toggle-opt'+(tw?'':' active')},'⏱ No window');
  const twOn=h('div',{className:'tw-toggle-opt'+(tw?' active':'')},'🕐 Set window');
  const twToggle=h('div',{className:'tw-toggle-row'},twOff,twOn);

  const twPickerWrap=document.createElement('div');
  const twHintWrap=document.createElement('div');

  function buildTwPicker(currentTw){
    twPickerWrap.innerHTML='';
    twHintWrap.innerHTML='';
    if(!currentTw)return;

    function toMins(hhmm){const[hh,mm]=(hhmm||'00:00').split(':').map(Number);return hh*60+mm}

    const startInp=document.createElement('input');
    startInp.type='time';startInp.className='tw-time-input';startInp.value=currentTw.start||'06:00';

    const endInp=document.createElement('input');
    endInp.type='time';endInp.className='tw-time-input';endInp.value=currentTw.end||'08:00';

    const fillEl=h('div',{className:'tw-timeline-fill'});
    const durLbl=h('div',{style:{fontSize:'10px',color:'var(--blue)',fontWeight:'600',marginTop:'5px',fontFamily:'JetBrains Mono,monospace',textAlign:'center'}});

    function updateTimeline(){
      const sMin=toMins(startInp.value);
      const eMin=toMins(endInp.value);
      const total=24*60;
      fillEl.style.left=(sMin/total*100).toFixed(1)+'%';
      fillEl.style.width=(Math.max(0,(eMin-sMin))/total*100).toFixed(1)+'%';
      const dur=Math.max(0,eMin-sMin);
      durLbl.textContent=dur>0?`${Math.floor(dur/60)}h${dur%60?` ${dur%60}m`:''}  window`:'set end after start';
    }
    updateTimeline();

    startInp.addEventListener('change',e=>{state.formTimeWindow={...state.formTimeWindow,start:e.target.value};updateTimeline();});
    endInp.addEventListener('change',e=>{state.formTimeWindow={...state.formTimeWindow,end:e.target.value};updateTimeline();});

    const picker=h('div',{className:'tw-picker'},
      h('div',{className:'tw-picker-row'},h('span',{className:'tw-picker-label'},'Start'),startInp),
      h('div',{className:'tw-picker-row'},h('span',{className:'tw-picker-label'},'End'),endInp),
      h('div',null,
        h('div',{className:'tw-timeline'},fillEl),
        h('div',{className:'tw-timeline-labels'},
          h('span',null,'12 AM'),h('span',null,'6 AM'),h('span',null,'12 PM'),h('span',null,'6 PM'),h('span',null,'12 AM')
        ),
        durLbl
      )
    );
    twPickerWrap.appendChild(picker);
    const hint=h('div',{className:'tw-hint'},'⏰  During this window your habit card will pulse red — a clear nudge to get it done. You can still check it off any time though, no stress.');
    twHintWrap.appendChild(hint);
  }
  buildTwPicker(tw);

  twOff.addEventListener('click',()=>{
    if(!state.formTimeWindow)return;
    state.formTimeWindow=null;
    twOff.classList.add('active');twOn.classList.remove('active');
    buildTwPicker(null);
  });
  twOn.addEventListener('click',()=>{
    if(state.formTimeWindow)return;
    state.formTimeWindow={start:'06:00',end:'08:00'};
    twOn.classList.add('active');twOff.classList.remove('active');
    buildTwPicker(state.formTimeWindow);
  });

  const modal=h('div',{className:'modal'},
    h('h3',null,isEdit?'✏️ Edit Habit':'📝 New Habit'),
    h('label',null,'Habit Name'),nameInput,
    h('label',null,'Category'),catSel,
    h('label',null,'Emoji'),emojiGrid,
    h('label',null,'Color'),colorRow,
    h('label',null,'Schedule'),
    typeRow,
    schedExtraWrap,
    h('label',null,'Time Window (optional)'),
    twToggle,
    twPickerWrap,
    twHintWrap,
    h('div',{className:'btn-row'},
      h('button',{className:'btn btn-s',onClick:closeModal},'Cancel'),
      h('button',{className:'btn btn-p',onClick:saveHabit},isEdit?'Save Changes':'Add Habit')
    )
  );
  setTimeout(()=>nameInput.focus(),50);
  overlay.appendChild(modal);
  return overlay;
}

// ── SETTINGS DRAWER ────────────────────────────────────────────────────────
function buildSettingsDrawer(){
  const isLight=document.body.classList.contains('light-mode');
  const compactMode=load('ht2_compact',false);
  const soundEnabled=load('ht2_sound',true);
  const startWeek=load('ht2_startweek','mon');
  const accentColor=load('ht2_accent','green');

  function mkToggle(id,checked,onChange){
    const inp=document.createElement('input');
    inp.type='checkbox';inp.id=id;if(checked)inp.checked=true;
    inp.addEventListener('change',onChange);
    const track=h('div',{className:'toggle-track'});
    const wrap=h('label',{className:'toggle-sw'},inp,track);
    return wrap;
  }

  // Accent color dots
  const accents=[
    {key:'green',color:'#39d353'},{key:'blue',color:'#58a6ff'},
    {key:'purple',color:'#bc8cff'},{key:'orange',color:'#f0883e'},
    {key:'gold',color:'#e3b341'},{key:'red',color:'#f85149'}
  ];
  const accentRow=h('div',{style:{display:'flex',gap:'6px',marginTop:'4px'}},
    ...accents.map(a=>{
      const dot=h('div',{style:{
        width:'18px',height:'18px',borderRadius:'50%',background:a.color,cursor:'pointer',
        border:accentColor===a.key?'2px solid var(--text)':'2px solid transparent',
        transition:'transform .15s,border .15s',transform:accentColor===a.key?'scale(1.2)':'scale(1)'
      }});
      dot.addEventListener('click',()=>{
        save('ht2_accent',a.key);
        document.documentElement.style.setProperty('--green',a.color);
        document.documentElement.style.setProperty('--green2',a.color+'cc');
        const drawer=document.getElementById('settings-drawer');
        if(drawer){
          const wasOpen=drawer.classList.contains('open');
          drawer.innerHTML='';
          const newContent=buildSettingsDrawer();
          // Move children from the newly built drawer into the existing drawer element
          while(newContent.firstChild)drawer.appendChild(newContent.firstChild);
          if(wasOpen)drawer.classList.add('open');
        }
      });
      return dot;
    })
  );

  const drawer=h('div',{id:'settings-drawer',className:'settings-drawer'},
    h('div',{className:'settings-drawer-header'},
      h('span',{className:'settings-drawer-title'},'⚙️  Settings'),
      h('button',{className:'settings-close-btn',onClick:closeSettings},'✕')
    ),

    // APPEARANCE
    h('div',{className:'settings-section'},
      h('div',{className:'settings-section-label'},'Appearance'),
      h('div',{className:'setting-row'},
        h('span',{className:'setting-label'},'☀️ Light Mode'),
        mkToggle('light-toggle',isLight,e=>{
          document.body.classList.toggle('light-mode',e.target.checked);
          save('ht2_lightmode',e.target.checked);
        })
      ),
      h('div',{className:'setting-row'},
        h('span',{className:'setting-label'},'📐 Compact View'),
        mkToggle('compact-toggle',compactMode,e=>{
          save('ht2_compact',e.target.checked);
          document.body.classList.toggle('compact-mode',e.target.checked);
        })
      ),
      h('div',{className:'setting-row',style:{flexDirection:'column',alignItems:'flex-start',gap:'6px'}},
        h('span',{className:'setting-label'},'🎨 Accent Color'),
        accentRow
      )
    ),

    // PREFERENCES
    h('div',{className:'settings-section'},
      h('div',{className:'settings-section-label'},'Preferences'),
      h('div',{className:'setting-row'},
        h('span',{className:'setting-label'},'🔔 Sound Effects'),
        mkToggle('sound-toggle',soundEnabled,e=>{
          save('ht2_sound',e.target.checked);
        })
      ),
      h('div',{className:'setting-row'},
        h('span',{className:'setting-label'},'📅 Week Starts'),
        h('select',{className:'setting-select',value:startWeek,onChange:e=>save('ht2_startweek',e.target.value)},
          Object.assign(document.createElement('option'),{value:'sun',textContent:'Sunday',selected:startWeek==='sun'}),
          Object.assign(document.createElement('option'),{value:'mon',textContent:'Monday',selected:startWeek==='mon'})
        )
      ),
      h('div',{className:'setting-row'},
        h('span',{className:'setting-label'},'🌍 Date Format'),
        h('select',{className:'setting-select',onChange:e=>save('ht2_datefmt',e.target.value)},
          Object.assign(document.createElement('option'),{value:'dd/mm',textContent:'DD/MM/YYYY',selected:load('ht2_datefmt','dd/mm')==='dd/mm'}),
          Object.assign(document.createElement('option'),{value:'mm/dd',textContent:'MM/DD/YYYY',selected:load('ht2_datefmt','dd/mm')==='mm/dd'})
        )
      )
    ),

    // HOW TO USE — moved above leaderboard
    h('div',{className:'settings-section'},
      h('div',{className:'settings-section-label'},'Guide'),
      h('button',{className:'drawer-reset-btn',style:{background:'linear-gradient(135deg,rgba(88,166,255,.12),rgba(188,140,255,.08))',borderColor:'rgba(88,166,255,.25)',color:'var(--blue)',fontWeight:'600'},onClick:()=>{closeSettings();openHowTo()}},'📖  How to use Ascend'),
      h('button',{id:'pwa-settings-btn',className:'drawer-reset-btn',style:{background:'linear-gradient(135deg,rgba(57,211,83,.08),rgba(31,111,235,.08))',borderColor:'rgba(57,211,83,.2)',color:'var(--green)',fontWeight:'600',marginTop:'6px'},onClick:()=>{closeSettings();pwaInstallFromSettings()}},'📲  Install Ascend as app'),
      h('button',{className:'drawer-reset-btn',style:{background:'linear-gradient(135deg,rgba(188,140,255,.12),rgba(88,166,255,.08))',borderColor:'rgba(188,140,255,.3)',color:'var(--purple)',fontWeight:'600',marginTop:'6px'},onClick:()=>{closeSettings();openShareModal()}},'✨  Share Progress')
    ),

    // LEADERBOARD
    h('div',{className:'settings-section'},
      h('div',{className:'settings-section-label'},'Leaderboard'),
      h('div',{className:'drawer-reset-opts'},
        lbIsSetUp()
          ? h('button',{className:'drawer-reset-btn',onClick:()=>{closeSettings();lbOpenOnboard()}},`🏁  Edit profile (${state.lbUsername})`)
          : h('button',{className:'drawer-reset-btn',onClick:()=>{closeSettings();lbOpenOnboard()}},'🏁  Set up leaderboard'),
        lbIsSetUp()
          ? h('button',{className:'drawer-reset-btn danger-btn',onClick:()=>{lbLeaveGroup();closeSettings()}},'🚪  Leave leaderboard')
          : null
      )
    ),

    // DATA & RESET
    h('div',{className:'settings-section'},
      h('div',{className:'settings-section-label'},'Data & Reset'),
      h('div',{className:'drawer-reset-opts'},
        h('button',{className:'drawer-reset-btn',onClick:()=>{if(confirm('Clear all check-ins? Habits and mood are kept.'))resetChecks();closeSettings()}},'🗓  Clear all check-ins'),
        h('button',{className:'drawer-reset-btn',onClick:()=>{if(confirm('Clear mood & motivation data?'))resetMood();closeSettings()}},'🧠  Clear mood & motivation'),
        h('button',{className:'drawer-reset-btn',onClick:exportData},'📤  Export data as JSON'),
        h('button',{className:'drawer-reset-btn',onClick:triggerImport},'📥  Import data from JSON'),
        h('button',{className:'drawer-reset-btn danger-btn',onClick:()=>{if(confirm('Reset EVERYTHING to defaults? Cannot be undone.'))resetAll()}},'⚠️  Reset everything')
      )
    ),

    // ABOUT
    h('div',{className:'settings-section',style:{borderBottom:'none'}},
      h('div',{className:'settings-section-label'},'About'),
      h('div',{style:{fontSize:'10px',color:'var(--text3)',lineHeight:'1.9'}},
        h('span',{style:{fontSize:'12px',fontWeight:'700',color:'var(--text)',letterSpacing:'-.2px'}},'📔 Ascend'),h('br',null),
        h('em',{style:{color:'var(--text3)',fontSize:'10px'}},'Build the life you\'re proud of.'),h('br',null),
        'Made with ❤️ by ',h('span',{style:{color:'var(--text2)',fontWeight:'600'}},'Alok Yadav'),h('br',null),
        h('span',{style:{fontFamily:'JetBrains Mono,monospace',fontSize:'9px'}},'Data stored locally in browser')
      )
    )
  );

  // Re-open state
  if(load('ht2_drawer_open',false)) drawer.classList.add('open');
  return drawer;
}

// ── HOW TO USE — Ascend branded guide ──────────────────────────────────────
function openHowTo(){
  const existing=document.getElementById('howto-overlay');
  if(existing)existing.remove();
  document.body.appendChild(buildHowTo());
}
function closeHowTo(){
  const el=document.getElementById('howto-overlay');
  if(el)el.remove();
}

function buildHowTo(){
  const overlay=document.createElement('div');
  overlay.className='howto-overlay';
  overlay.id='howto-overlay';
  overlay.addEventListener('click',e=>{if(e.target===overlay)closeHowTo()});

  function section(colorClass,emoji,title,...paras){
    const sec=document.createElement('div');
    sec.className=`howto-section ${colorClass}`;
    const ttl=document.createElement('div');
    ttl.className='howto-section-title';
    ttl.innerHTML=`<span>${emoji}</span>${title}`;
    sec.appendChild(ttl);
    paras.forEach(p=>{
      if(typeof p==='string'){
        const el=document.createElement('p');el.innerHTML=p;sec.appendChild(el);
      } else {sec.appendChild(p);}
    });
    return sec;
  }
  function tip(text){const d=document.createElement('div');d.className='howto-tip';d.innerHTML=text;return d;}
  function tags(...items){
    const w=document.createElement('div');w.style.cssText='display:flex;flex-wrap:wrap;gap:4px;margin-top:6px';
    items.forEach(([label,cls])=>{const t=document.createElement('span');t.className=`howto-tag${cls?' '+cls:''}`;t.textContent=label;w.appendChild(t);});
    return w;
  }

  const modal=document.createElement('div');
  modal.className='howto-modal';

  // HEADER
  const header=document.createElement('div');
  header.className='howto-header';
  header.innerHTML=`
    <div class="howto-brand">
      <div class="howto-brand-icon">📔</div>
      <div>
        <div class="howto-brand-name">Ascend</div>
        <div class="howto-brand-sub">Build the life you're proud of</div>
      </div>
    </div>
    <button class="howto-close" onclick="closeHowTo()">✕</button>
  `;

  // BODY
  const body=document.createElement('div');
  body.className='howto-body';

  body.appendChild(section('s-green','🌱','Welcome to Ascend',
    `Built by <strong style="color:var(--text)">Alok Yadav</strong> to help you build habits that actually stick. No subscriptions, no accounts — just you and your streaks.`,
    `Everything stays <strong style="color:var(--text)">on your device</strong>. Nothing is sent anywhere.`
  ));

  body.appendChild(section('s-blue','✅','Adding habits',
    `Hit <strong style="color:var(--text)">+ Add Habit</strong> in the sidebar. Name it, pick an emoji and colour, set a category — done.`,
    tip('💡 Keep names short and action-y. "Run 20 min" beats "Try to exercise more".')
  ));

  body.appendChild(section('s-orange','📅','Schedules',
    `Choose how often each habit runs:`,
    tags(
      ['Every day','green'],['Specific days',''],['Odd / even days','orange'],['X times a week','orange']
    ),
    tip('💡 Habits only count on scheduled days — a 3×/week habit gives you 3 chances, not 7.')

// Validate that a parsed JSON object actually looks like a real backup from
// this app before we ever touch existing localStorage data.
function isValidBackup(obj){
  if(!obj||typeof obj!=='object')return false;
  if(obj.__app!=='habit-tracker-by-alok')return false;
  if(!Array.isArray(obj.habits))return false;
  if(typeof obj.checks!=='object'||obj.checks===null)return false;
  return true;
}

function importDataFile(file){
  const reader=new FileReader();
  reader.onload=()=>{
    let parsed;
    try{ parsed=JSON.parse(reader.result); }
    catch(e){ alert("This file isn't valid JSON, so it can't be imported. Nothing was changed."); return; }

    if(!isValidBackup(parsed)){
      alert("This doesn't look like a Habit Tracker backup file, so importing it was cancelled to protect your existing data. Nothing was changed.");
      return;
    }

    const ok=confirm(
      'Importing this file will REPLACE all your current habits, check-ins, mood history, and notes.\n\n'+
      'This cannot be undone. Continue?'
    );
    if(!ok)return;

    // Replace the relevant localStorage keys + in-memory state, leave
    // leaderboard identity and cosmetic settings untouched.
    save('ht2_habits',parsed.habits||[]);
    save('ht2_checks',parsed.checks||{});
    save('ht2_mood',parsed.mood||{});
    save('ht2_motiv',parsed.motiv||{});
    save('ht2_notes',parsed.notes||{});
    if(parsed.widgetOrder)save('ht2_widget_order',parsed.widgetOrder);

    state.habits=parsed.habits||[];
    state.checks=parsed.checks||{};
    state.mood=parsed.mood||{};
    state.motiv=parsed.motiv||{};
    if(parsed.widgetOrder)state.widgetOrder=parsed.widgetOrder;

    setState({modal:null});
    if(lbIsSetUp())setTimeout(lbPushScore,50); // reflect new data in leaderboard score
    alert('Import complete — your data has been restored.');
  };
  reader.onerror=()=>{ alert("Couldn't read that file. Nothing was changed."); };
  reader.readAsText(file);
}

function triggerImport(){
  const input=document.createElement('input');
  input.type='file';
  input.accept='application/json,.json';
  input.addEventListener('change',e=>{
    const file=e.target.files&&e.target.files[0];
    if(file)importDataFile(file);
  });
  input.click();
}

// ── RESIZABLE WIDGETS ──────────────────────────────────────────────────────
function initResizable(){
  document.querySelectorAll('.widget').forEach(widget=>{
    // Add resize handle
    const handle=document.createElement('div');
    handle.className='resize-handle';
    widget.style.position='relative';
    widget.appendChild(handle);

    let startX,startY,startW,startH;
    handle.addEventListener('mousedown',e=>{
      e.preventDefault();
      startX=e.clientX;startY=e.clientY;
      startW=widget.offsetWidth;startH=widget.offsetHeight;
      const onMove=e=>{
        const nw=Math.max(200,startW+(e.clientX-startX));
        const nh=Math.max(100,startH+(e.clientY-startY));
        widget.style.width=nw+'px';
        widget.style.height=nh+'px';
        widget.style.overflow='hidden';
      };
      const onUp=()=>{
        document.removeEventListener('mousemove',onMove);
        document.removeEventListener('mouseup',onUp);
      };
      document.addEventListener('mousemove',onMove);
      document.addEventListener('mouseup',onUp);
    });
  });
}

// ── DRAGGABLE (basic reorder within main) ─────────────────────────────────
function initDraggable(){
  // Cards can be collapsed/expanded via the toggle buttons — drag handled via native HTML5
  // We attach drag handles to each .card inside .main-content's direct children
  const cards=document.querySelectorAll('.main-content > .card, .main-content > .widget');
  cards.forEach(card=>{
    card.setAttribute('draggable','true');
    card.style.cursor='default';
    const handle=document.createElement('div');
    handle.className='drag-handle';
    handle.title='Drag to reorder';
    handle.innerHTML='⠿';
    card.insertBefore(handle,card.firstChild);

    card.addEventListener('dragstart',e=>{
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
    });
    card.addEventListener('dragend',()=>card.classList.remove('dragging'));
    card.addEventListener('dragover',e=>{
      e.preventDefault();
      e.dataTransfer.dropEffect='move';
      const dragging=document.querySelector('.dragging');
      if(dragging&&dragging!==card){
        const rect=card.getBoundingClientRect();
        const mid=rect.top+rect.height/2;
        if(e.clientY<mid){
          card.parentNode.insertBefore(dragging,card);
        } else {
          card.parentNode.insertBefore(dragging,card.nextSibling);
        }
      }
    });
  });
}

<script>
// ── PWA ENGINE ────────────────────────────────────────────────────────────────
const PWA_KEY='ascend_pwa_dismissed';
const PWA_INSTALLED_KEY='ascend_pwa_installed';
const isHosted=location.protocol==='https:'&&location.hostname==='alok-who-builds.github.io';
let _deferredPrompt=null;
let _swReg=null;

// Detect device type
function isIOS(){return/iphone|ipad|ipod/i.test(navigator.userAgent)&&!window.MSStream}
function isAndroid(){return/android/i.test(navigator.userAgent)}
function isMobile(){return isIOS()||isAndroid()||window.innerWidth<=768}
function isInStandaloneMode(){return window.matchMedia('(display-mode:standalone)').matches||window.navigator.standalone===true}

// ── SERVICE WORKER ────────────────────────────────────────────────────────────

function registerSW(){
  if(!('serviceWorker' in navigator))return;
  navigator.serviceWorker.register('/Alok-s-habit-tracker-/sw.js',{scope:'/Alok-s-habit-tracker-/'})
    .then(reg=>{
      _swReg=reg;
      reg.addEventListener('updatefound',()=>{
        const nw=reg.installing;
        if(!nw)return;
        nw.addEventListener('statechange',()=>{
          if(nw.state==='installed'&&navigator.serviceWorker.controller){
            document.getElementById('pwa-update-bar').classList.add('show');
          }
        });
      });
    })
    .catch(err=>console.warn('SW registration failed:',err));
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    window.location.reload();
  });
}

function pwaDoUpdate(){
  if(_swReg&&_swReg.waiting){
    _swReg.waiting.postMessage('skipWaiting');
  } else {
    window.location.reload();
  }
}

// ── INSTALL PROMPT LOGIC ──────────────────────────────────────────────────────
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  _deferredPrompt=e;
  if(!localStorage.getItem(PWA_KEY)&&!localStorage.getItem(PWA_INSTALLED_KEY)&&isMobile()&&isHosted){
    setTimeout(pwaShowPrompt, 30000);
  }
});

window.addEventListener('appinstalled',()=>{
  localStorage.setItem(PWA_INSTALLED_KEY,'1');
  pwaDismiss();
  _deferredPrompt=null;
});

function pwaShowPrompt(){
  if(isInStandaloneMode())return; // already installed
  if(localStorage.getItem(PWA_KEY))return; // dismissed
  if(localStorage.getItem(PWA_INSTALLED_KEY))return; // installed
  const prompt=document.getElementById('pwa-prompt');
  if(!prompt)return;

  if(isIOS()){
    // iOS: can't trigger install programmatically, show instructions
    document.getElementById('pwa-sub').textContent='Tap the Share button below, then "Add to Home Screen" to install Ascend.';
    document.getElementById('pwa-btns').innerHTML=`
      <div class="pwa-ios-arrow" style="flex:1;background:var(--bg3);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--text2);line-height:1.6">
        📱 In Safari: tap <strong style="color:var(--text)">Share ↑</strong> → <strong style="color:var(--text)">Add to Home Screen</strong>
      </div>
    `;
  }
  prompt.classList.add('show');
}

async function pwaDoInstall(){
  if(isIOS()){pwaDismiss();return;}
  if(!_deferredPrompt){
    // Fallback if prompt not available
    pwaDismiss();
    return;
  }
  _deferredPrompt.prompt();
  const{outcome}=await _deferredPrompt.userChoice;
  if(outcome==='accepted'){
    localStorage.setItem(PWA_INSTALLED_KEY,'1');
  }
  _deferredPrompt=null;
  pwaDismiss();
}

function pwaDismiss(){
  const prompt=document.getElementById('pwa-prompt');
  if(prompt)prompt.classList.remove('show');
  localStorage.setItem(PWA_KEY,'1');
}

// Settings drawer install button
function pwaInstallFromSettings(){
  if(isInStandaloneMode()){
    alert('Ascend is already installed on your device! 🎉');
    return;
  }
  if(isIOS()){
    // Show the prompt for iOS instructions
    localStorage.removeItem(PWA_KEY);
    pwaShowPrompt();
    return;
  }
  if(_deferredPrompt){
    // Android — trigger native prompt immediately
    pwaDoInstall();
    return;
  }
  // Desktop or prompt not available
  alert('To install Ascend:\n\nChrome: click the ⊕ icon in the address bar\nEdge: click the ⊕ icon in the address bar\n\nOr open on your Android phone for the easiest install!');
}

  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawGlowText(ctx,text,x,y,font,color,glow,blur=18){
  ctx.save();
  ctx.shadowColor=glow;ctx.shadowBlur=blur;
  ctx.font=font;ctx.fillStyle=color;ctx.fillText(text,x,y);
  ctx.shadowBlur=0;ctx.restore();
}

// ── MONTHLY DATA ENGINE ────────────────────────────────────────────────────

function collectMonthlyData(){
  const {year,month,habits,checks,mood,motiv}=state;
  const days=daysInMonth(year,month);
  const today=new Date();
  const isCur=today.getFullYear()===year&&today.getMonth()===month;
  const maxDay=isCur?today.getDate():days;

  // Total completions
  let totalDone=0,totalGoal=0;
  habits.forEach(h=>{
    for(let d=1;d<=maxDay;d++){
      if(isScheduled(h,year,month,d)){
        totalGoal++;
        if(checks[`${year}-${month}-${h.id}-${d}`])totalDone++;
      }
    }
  });
  const pct=totalGoal?Math.round(totalDone/totalGoal*100):0;

  // Best & current streak (overall, across all habits combined per day)
  let bestStreak=0,curStreak=0,tmp=0;
  for(let d=1;d<=maxDay;d++){
    const done=habits.filter(h=>checks[`${year}-${month}-${h.id}-${d}`]).length;
    const scheduled=habits.filter(h=>isScheduled(h,year,month,d)).length;
    if(scheduled>0&&done===scheduled){tmp++;if(tmp>bestStreak)bestStreak=tmp;}
    else tmp=0;
  }
  for(let d=maxDay;d>=1;d--){
    const done=habits.filter(h=>checks[`${year}-${month}-${h.id}-${d}`]).length;
    const scheduled=habits.filter(h=>isScheduled(h,year,month,d)).length;
    if(scheduled>0&&done===scheduled)curStreak++;else break;
  }

  // Top 3 habits
  const habitRanked=habits.map(h=>{
    let done=0,goal=0;
    for(let d=1;d<=maxDay;d++){
      if(isScheduled(h,year,month,d)){goal++;if(checks[`${year}-${month}-${h.id}-${d}`])done++;}
    }
    return{...h,done,goal,pct:goal?Math.round(done/goal*100):0};
  }).sort((a,b)=>b.pct-a.pct).slice(0,3);

  // Mood avg
  const moodVals=Array.from({length:maxDay},(_,i)=>mood[`${year}-${month}-${i+1}`]).filter(Boolean);
  const motivVals=Array.from({length:maxDay},(_,i)=>motiv[`${year}-${month}-${i+1}`]).filter(Boolean);
  const avgMood=moodVals.length?Math.round(moodVals.reduce((a,b)=>a+b,0)/moodVals.length*10)/10:null;
  const avgEnergy=motivVals.length?Math.round(motivVals.reduce((a,b)=>a+b,0)/motivVals.length*10)/10:null;

  // Daily completion for heatmap
  const dailyLevels=Array.from({length:maxDay},(_,i)=>{
    const d=i+1;
    const done=habits.filter(h=>checks[`${year}-${month}-${h.id}-${d}`]).length;
    if(!habits.length||done===0)return 0;
    const pctD=done/habits.length;
    if(done===1&&habits.length>1)return 1;
    if(pctD<=0.25)return 1;if(pctD<=0.5)return 2;if(pctD<=0.75)return 3;
    if(pctD<1)return 4;return 5;
  });

  // Best day of week
  const dowTotals=[0,0,0,0,0,0,0],dowCounts=[0,0,0,0,0,0,0];
  for(let d=1;d<=maxDay;d++){
    const dow=new Date(year,month,d).getDay();
    const done=habits.filter(h=>isScheduled(h,year,month,d)&&checks[`${year}-${month}-${h.id}-${d}`]).length;
    const goal=habits.filter(h=>isScheduled(h,year,month,d)).length;
    if(goal>0){dowTotals[dow]+=done/goal;dowCounts[dow]++;}
  }
  const dowAvg=dowTotals.map((t,i)=>dowCounts[i]?t/dowCounts[i]:0);
  const bestDow=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][dowAvg.indexOf(Math.max(...dowAvg))];

  // Achievement message
  const msgFn=ACHIEVEMENT_MSGS_MONTH[Math.floor(Math.random()*ACHIEVEMENT_MSGS_MONTH.length)];
  const achieveMsg=msgFn(totalDone,maxDay);

  return{year,month,pct,totalDone,totalGoal,bestStreak,curStreak,habitRanked,avgMood,avgEnergy,dailyLevels,bestDow,maxDay,achieveMsg,habits};
}

// ── YEARLY DATA ENGINE ──────────────────────────────────────────────────────

function collectYearlyData(){
  const {year,habits,checks}=state;
  const today=new Date();
  const isCur=today.getFullYear()===year;
  const maxMonth=isCur?today.getMonth():11;

  let totalDone=0,totalGoal=0;
  // Monthly bars
  const monthlyPct=Array.from({length:12},(_,m)=>{
    if(m>maxMonth)return null;
    const days=daysInMonth(year,m);
    const maxD=isCur&&m===maxMonth?today.getDate():days;
    let done=0,goal=0;
    habits.forEach(h=>{
      for(let d=1;d<=maxD;d++){
        if(isScheduled(h,year,m,d)){goal++;if(checks[`${year}-${m}-${h.id}-${d}`])done++;}
      }
    });
    totalDone+=done;totalGoal+=goal;
    return goal?Math.round(done/goal*100):0;
  });
  const pct=totalGoal?Math.round(totalDone/totalGoal*100):0;

  // Best streak across whole year
  let bestStreak=0,tmp=0;
  for(let m=0;m<=maxMonth;m++){
    const days=daysInMonth(year,m);
    const maxD=isCur&&m===maxMonth?today.getDate():days;
    for(let d=1;d<=maxD;d++){
      const done=habits.filter(h=>checks[`${year}-${m}-${h.id}-${d}`]).length;
      const scheduled=habits.filter(h=>isScheduled(h,year,m,d)).length;
      if(scheduled>0&&done===scheduled){tmp++;if(tmp>bestStreak)bestStreak=tmp;}
      else tmp=0;
    }
  }

  // Most consistent habit
  const habitYearPct=habits.map(h=>{
    let done=0,goal=0;
    for(let m=0;m<=maxMonth;m++){
      const days=daysInMonth(year,m);
      const maxD=isCur&&m===maxMonth?today.getDate():days;
      for(let d=1;d<=maxD;d++){
        if(isScheduled(h,year,m,d)){goal++;if(checks[`${year}-${m}-${h.id}-${d}`])done++;}
      }
    }
    return{...h,pct:goal?Math.round(done/goal*100):0};
  }).sort((a,b)=>b.pct-a.pct);
  const topHabit=habitYearPct[0]||null;

  // Heatmap: 53 weeks
  const jan1=new Date(year,0,1);
  const startDow=jan1.getDay();
  const startDate=new Date(jan1);
  startDate.setDate(jan1.getDate()-startDow);
  const weeks=[];
  let dw=new Date(startDate);
  for(let w=0;w<53;w++){
    const week=[];
    for(let day=0;day<7;day++){
      week.push(new Date(dw));
      dw.setDate(dw.getDate()+1);
    }
    weeks.push(week);
  }

  const msgFn=YEAR_MSGS[Math.floor(Math.random()*YEAR_MSGS.length)];
  const yearMsg=msgFn(year);

  return{year,pct,totalDone,totalGoal,bestStreak,monthlyPct,topHabit,habits,weeks,yearMsg,maxMonth};
}

function getCellLevel(date,habits,checks){
  const y=date.getFullYear(),m=date.getMonth(),d=date.getDate();
  if(!habits.length)return 0;
  let done=0;
  habits.forEach(h=>{if(checks[`${y}-${m}-${h.id}-${d}`])done++;});
  if(done===0)return 0;
  const p=done/habits.length;
  if(done===1&&habits.length>1)return 1;
  if(p<=0.25)return 1;if(p<=0.5)return 2;if(p<=0.75)return 3;if(p<1)return 4;return 5;
}

// ── LEVEL → COLOR ──────────────────────────────────────────────────────────
const HEAT_COLORS=['#1c2128','#1a3a1f','#215e28','#2ea043','#3dd460','#57e879'];

// ── MONTHLY CARD RENDERER ──────────────────────────────────────────────────

function drawMonthlyCard(canvas,data,perf){
  const W=canvas.width,H=canvas.height;
  const ctx=canvas.getContext('2d');
  const S=W/1080;
  const PAD=52*S;

  // ── BACKGROUND: deep layered gradient ──
  const bg=ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,perf.c1);
  bg.addColorStop(0.45,perf.c2);
  bg.addColorStop(1,perf.c3||perf.c1);
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // Noise texture — subtle dot grid
  ctx.save();
  ctx.globalAlpha=0.018;
  for(let x=0;x<W;x+=28*S){for(let y=0;y<H;y+=28*S){
    ctx.beginPath();ctx.arc(x,y,1*S,0,Math.PI*2);
    ctx.fillStyle='#fff';ctx.fill();
  }}
  ctx.restore();

  // Glow orb — top right, large
  const glowR=ctx.createRadialGradient(W*0.82,H*0.08,0,W*0.82,H*0.08,W*0.55);
  glowR.addColorStop(0,perf.glow);
  glowR.addColorStop(0.6,perf.glow2||'transparent');
  glowR.addColorStop(1,'transparent');
  ctx.fillStyle=glowR;ctx.fillRect(0,0,W,H);

  // Second glow — bottom left, muted
  const glowL=ctx.createRadialGradient(W*0.15,H*0.92,0,W*0.15,H*0.92,W*0.4);
  glowL.addColorStop(0,(perf.glow2||'rgba(255,255,255,.04)'));
  glowL.addColorStop(1,'transparent');
  ctx.fillStyle=glowL;ctx.fillRect(0,0,W,H);

  // ── SECTION HELPERS ──
  function sectionLabel(text,x,y){
    ctx.save();
    // Small accent dot
    ctx.beginPath();ctx.arc(x,y-3.5*S,2.5*S,0,Math.PI*2);
    ctx.fillStyle=perf.accent+'88';ctx.fill();
    ctx.font=`700 ${Math.round(9*S)}px Inter,sans-serif`;
    ctx.fillStyle='rgba(255,255,255,.32)';
    ctx.letterSpacing='2.5px';
    ctx.fillText(text,x+9*S,y);
    ctx.letterSpacing='0px';
    ctx.restore();
  }

  function pill(x,y,w,h,r,fillColor,strokeColor){
    roundRect(ctx,x,y,w,h,r);
    ctx.fillStyle=fillColor;ctx.fill();
    if(strokeColor){ctx.strokeStyle=strokeColor;ctx.lineWidth=1*S;ctx.stroke();}
  }

  // ════════════════════════════════════════════
  //  ZONE 1 — HEADER (top ~22%)
  // ════════════════════════════════════════════
  let cy=56*S;

  // Logo row
  ctx.font=`${Math.round(18*S)}px Inter,sans-serif`;
  ctx.fillStyle='rgba(255,255,255,.5)';
  ctx.fillText('📔',PAD,cy);
  ctx.font=`600 ${Math.round(13*S)}px Inter,sans-serif`;
  ctx.fillStyle='rgba(255,255,255,.35)';
  ctx.fillText('ASCEND',PAD+28*S,cy-1*S);

  // Performance badge — top right
  const badgeText=perf.label.toUpperCase();
  ctx.font=`700 ${Math.round(9.5*S)}px Inter,sans-serif`;
  const bw=ctx.measureText(badgeText).width+20*S;
  const bx=W-PAD-bw,by=cy-15*S,bh=20*S;
  roundRect(ctx,bx,by,bw,bh,bh/2);
  ctx.fillStyle=perf.accent+'22';ctx.fill();
  ctx.strokeStyle=perf.accent+'55';ctx.lineWidth=1*S;ctx.stroke();
  ctx.fillStyle=perf.accent;
  ctx.textAlign='center';
  ctx.fillText(badgeText,bx+bw/2,by+13.5*S);
  ctx.textAlign='left';

  // Month title — BIG
  cy+=62*S;
  const monthStr=MONTHS[data.month].toUpperCase();
  ctx.save();
  ctx.font=`800 ${Math.round(72*S)}px Inter,sans-serif`;
  ctx.fillStyle='rgba(255,255,255,.08)'; // ghost layer for depth
  ctx.fillText(monthStr,PAD+2*S,cy+2*S);
  ctx.restore();
  drawGlowText(ctx,monthStr,PAD,cy,`800 ${Math.round(72*S)}px Inter,sans-serif`,'#e6edf3',perf.glow,20);

  // Year — lighter, right-aligned baseline
  ctx.font=`300 ${Math.round(30*S)}px Inter,sans-serif`;
  ctx.fillStyle='rgba(255,255,255,.3)';
  ctx.fillText(String(data.year),PAD,cy+28*S);

  // ── HERO PERCENTAGE ──
  cy+=88*S;

  // Arc ring behind the number (right side decoration)
  const arcCX=W-PAD-90*S, arcCY=cy-60*S, arcR=88*S;
  const arcAngle=(data.pct/100)*Math.PI*2;
  // Track
  ctx.save();
  ctx.beginPath();
  ctx.arc(arcCX,arcCY,arcR,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=6*S;ctx.stroke();
  // Progress arc
  ctx.beginPath();
  ctx.arc(arcCX,arcCY,arcR,-Math.PI/2,-Math.PI/2+arcAngle);
  const arcGrad=ctx.createLinearGradient(arcCX-arcR,arcCY,arcCX+arcR,arcCY);
  arcGrad.addColorStop(0,perf.accent);arcGrad.addColorStop(1,perf.accent2||perf.accent);
  ctx.strokeStyle=arcGrad;ctx.lineWidth=6*S;ctx.lineCap='round';
  ctx.shadowColor=perf.glow;ctx.shadowBlur=12*S;
  ctx.stroke();
  // Inner label inside arc
  ctx.font=`600 ${Math.round(11*S)}px Inter,sans-serif`;
  ctx.fillStyle='rgba(255,255,255,.3)';ctx.textAlign='center';
  ctx.shadowBlur=0;
  ctx.fillText(MONTHS[data.month].toUpperCase(),arcCX,arcCY-10*S);
  ctx.font=`700 ${Math.round(10*S)}px Inter,sans-serif`;
  ctx.fillStyle='rgba(255,255,255,.18)';
  ctx.fillText(String(data.year),arcCX,arcCY+8*S);
  ctx.textAlign='left';
  ctx.restore();

  // Massive % with glow
  ctx.save();
  ctx.font=`800 ${Math.round(148*S)}px Inter,sans-serif`;
  // Shadow pass
  ctx.shadowColor=perf.glow;ctx.shadowBlur=60*S;
  ctx.fillStyle=perf.accent;
  ctx.fillText(data.pct+'%',PAD-6*S,cy);
  ctx.shadowBlur=0;
  ctx.restore();

  // Label below %
  cy+=22*S;
  ctx.font=`500 ${Math.round(14*S)}px Inter,sans-serif`;
  ctx.fillStyle='rgba(255,255,255,.38)';
  ctx.fillText('MONTHLY COMPLETION',PAD,cy);

  // Subtle divider line
  cy+=22*S;
  const divG=ctx.createLinearGradient(PAD,0,W-PAD,0);
  divG.addColorStop(0,perf.accent+'cc');
  divG.addColorStop(0.4,perf.accent+'44');
  divG.addColorStop(1,'transparent');
  ctx.strokeStyle=divG;ctx.lineWidth=1.5*S;
  ctx.beginPath();ctx.moveTo(PAD,cy);ctx.lineTo(W-PAD,cy);ctx.stroke();

  // ════════════════════════════════════════════
  //  ZONE 2 — MIDDLE (50%): heatmap + habits + stats
  // ════════════════════════════════════════════

  // ── MONTHLY HEATMAP (large, full-width) ──
  cy+=34*S;
  sectionLabel('THIS MONTH',PAD,cy);
  cy+=18*S;

  // Day-of-week labels
  const DOW_LABELS=['S','M','T','W','T','F','S'];
  const cellSize=Math.round(H>1080?33*S:28*S);
  const cellGap=Math.round(5*S);
  const heatW=7*(cellSize+cellGap)-cellGap;
  // Center the heatmap horizontally
  const heatX=PAD;

  ctx.font=`500 ${Math.round(8.5*S)}px Inter,sans-serif`;
  ctx.fillStyle='rgba(255,255,255,.22)';
  DOW_LABELS.forEach((lbl,i)=>{
    ctx.textAlign='center';
    ctx.fillText(lbl,heatX+i*(cellSize+cellGap)+cellSize/2,cy);
  });
  ctx.textAlign='left';
  cy+=12*S;

  const cols=7;
  const startDow=new Date(data.year,data.month,1).getDay();
  for(let d=0;d<data.dailyLevels.length;d++){
    const col=(d+startDow)%cols;
    const row=Math.floor((d+startDow)/cols);
    const cx2=heatX+col*(cellSize+cellGap);
    const cy2=cy+row*(cellSize+cellGap);
    const level=data.dailyLevels[d];
    roundRect(ctx,cx2,cy2,cellSize,cellSize,4*S);
    ctx.fillStyle=HEAT_COLORS[level];ctx.fill();
    if(level>=4){
      ctx.save();
      ctx.shadowColor=HEAT_COLORS[level];ctx.shadowBlur=8*S;
      ctx.fill();ctx.restore();
    }
    // Day number inside cell
    if(cellSize>=26*S){
      ctx.font=`500 ${Math.round(7*S)}px Inter,sans-serif`;
      ctx.fillStyle=level>=3?'rgba(0,0,0,.5)':'rgba(255,255,255,.18)';
      ctx.textAlign='center';
      ctx.fillText(String(d+1),cx2+cellSize/2,cy2+cellSize/2+3*S);
      ctx.textAlign='left';
    }
  }
  const heatRows=Math.ceil((data.dailyLevels.length+startDow)/cols);
  cy+=heatRows*(cellSize+cellGap)+32*S;

  // ── STAT PILLS ──
  const stats=[
    {val:data.totalDone+'',lbl:'Habits Done',color:'#e6edf3'},
    {val:data.curStreak+'d',lbl:'Current Streak',color:perf.accent},
    {val:data.bestStreak+'d',lbl:'Best Streak',color:'#e3b341'},
  ];
  const pillW=(W-PAD*2-16*S*2)/3;
  const pillH=66*S;
  stats.forEach((st,i)=>{
    const px2=PAD+i*(pillW+16*S),py=cy;
    roundRect(ctx,px2,py,pillW,pillH,10*S);
    ctx.fillStyle='rgba(255,255,255,.05)';ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.09)';ctx.lineWidth=1*S;ctx.stroke();
    // Top accent line
    ctx.save();
    roundRect(ctx,px2+10*S,py,pillW-20*S,2.5*S,1.5*S);
    ctx.fillStyle=st.color+'66';ctx.fill();
    ctx.restore();
    // Value
    ctx.font=`700 ${Math.round(28*S)}px 'JetBrains Mono',monospace`;
    ctx.fillStyle=st.color;
    ctx.textAlign='center';
    ctx.fillText(st.val,px2+pillW/2,py+36*S);
    // Label
    ctx.font=`500 ${Math.round(9*S)}px Inter,sans-serif`;
    ctx.fillStyle='rgba(255,255,255,.28)';
    ctx.fillText(st.lbl.toUpperCase(),px2+pillW/2,py+54*S);
    ctx.textAlign='left';
  });
  cy+=pillH+32*S;

  // ── TOP HABITS with medal bars ──
  if(data.habitRanked&&data.habitRanked.length>0){
    sectionLabel('TOP HABITS',PAD,cy);
    cy+=18*S;

    const MEDALS=['🥇','🥈','🥉'];
    const barTotalW=W-PAD*2;
    const barH=40*S;
    const barGap=8*S;

    data.habitRanked.forEach((h,i)=>{
      const by=cy+i*(barH+barGap);
      const fillRatio=Math.max(0.04,h.pct/100);

      // Track bg
      roundRect(ctx,PAD,by,barTotalW,barH,8*S);
      ctx.fillStyle='rgba(255,255,255,.04)';ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,.07)';ctx.lineWidth=1*S;ctx.stroke();

      // Fill bar
      roundRect(ctx,PAD,by,barTotalW*fillRatio,barH,8*S);
      const bf=ctx.createLinearGradient(PAD,0,PAD+barTotalW,0);
      bf.addColorStop(0,perf.accent+'99');
      bf.addColorStop(1,perf.accent+'18');
      ctx.fillStyle=bf;ctx.fill();

      // Medal
      ctx.font=`${Math.round(16*S)}px Inter,sans-serif`;
      ctx.fillText(MEDALS[i]||'',PAD+10*S,by+barH/2+6*S);

      // Habit name
      ctx.font=`600 ${Math.round(13*S)}px Inter,sans-serif`;
      ctx.fillStyle='#e6edf3';
      const nameX=PAD+34*S;
      // Truncate if needed
      let hname=(h.emoji?' ':'')+h.name;
      ctx.fillText(hname,nameX,by+barH/2+5*S);

      // Percentage — right aligned
      ctx.font=`700 ${Math.round(14*S)}px 'JetBrains Mono',monospace`;
      ctx.fillStyle=perf.accent;
      ctx.textAlign='right';
      ctx.fillText(h.pct+'%',PAD+barTotalW-12*S,by+barH/2+5*S);
      ctx.textAlign='left';
    });
    cy+=data.habitRanked.length*(barH+barGap)+32*S;
  }

  // ── MOOD + BEST DAY (if available) ──
  if(data.avgMood||data.avgEnergy||data.bestDow){
    const moodPillW=(W-PAD*2-12*S*(2))/3;
    const MOOD_EM=['😞','😕','😐','🙂','😊','😄','🤩'];

    const moodItems=[];
    if(data.avgMood){
      const idx=Math.min(6,Math.round((data.avgMood/10)*6));
      moodItems.push({icon:MOOD_EM[idx],label:'Avg Mood',val:data.avgMood.toFixed(1)+'/10',color:'#f0883e'});
    }
    if(data.avgEnergy){
      moodItems.push({icon:'⚡',label:'Avg Energy',val:data.avgEnergy.toFixed(1)+'/10',color:'#58a6ff'});
    }
    if(data.bestDow){
      moodItems.push({icon:'📅',label:'Best Day',val:data.bestDow,color:'#e3b341'});
    }

    const mPillH=64*S;
    const mPillW=(W-PAD*2-(moodItems.length-1)*12*S)/moodItems.length;
    moodItems.forEach((mi,i)=>{
      const mx=PAD+i*(mPillW+12*S);
      roundRect(ctx,mx,cy,mPillW,mPillH,10*S);
      ctx.fillStyle='rgba(255,255,255,.04)';ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,.08)';ctx.lineWidth=1*S;ctx.stroke();
      // icon
      ctx.font=`${Math.round(18*S)}px Inter,sans-serif`;
      ctx.fillText(mi.icon,mx+12*S,cy+28*S);
      // label
      ctx.font=`500 ${Math.round(8.5*S)}px Inter,sans-serif`;
      ctx.fillStyle='rgba(255,255,255,.3)';
      ctx.fillText(mi.label.toUpperCase(),mx+12*S,cy+44*S);
      // value
      ctx.font=`700 ${Math.round(12*S)}px 'JetBrains Mono',monospace`;
      ctx.fillStyle=mi.color;
      ctx.textAlign='right';
      ctx.fillText(mi.val,mx+mPillW-12*S,cy+28*S);
      ctx.textAlign='left';
    });
    cy+=mPillH+32*S;
  }

  // ════════════════════════════════════════════
  //  ZONE 3 — BOTTOM (insight + quote + branding)
  // ════════════════════════════════════════════

  // Pin to bottom — compute remaining
  const footerH=130*S;
  const insightY=H-footerH-10*S;

  // ── INSIGHT PILL ──
  const insightPillH=68*S;
  roundRect(ctx,PAD,insightY,W-PAD*2,insightPillH,14*S);
  // Gradient fill
  const ipG=ctx.createLinearGradient(PAD,insightY,W-PAD,insightY+insightPillH);
  ipG.addColorStop(0,perf.accent+'18');
  ipG.addColorStop(1,'rgba(255,255,255,.03)');
  ctx.fillStyle=ipG;ctx.fill();
  ctx.strokeStyle=perf.accent+'40';ctx.lineWidth=1.5*S;ctx.stroke();

  // Left accent bar
  roundRect(ctx,PAD,insightY,4*S,insightPillH,2*S);
  ctx.fillStyle=perf.accent;
  ctx.shadowColor=perf.glow;ctx.shadowBlur=10*S;
  ctx.fill();ctx.shadowBlur=0;

  // Insight icon
  ctx.font=`${Math.round(20*S)}px Inter,sans-serif`;
  ctx.fillText('💡',PAD+16*S,insightY+42*S);

  // Insight text
  ctx.font=`500 ${Math.round(13*S)}px Inter,sans-serif`;
  ctx.fillStyle='rgba(255,255,255,.75)';
  // wrap text if too long
  const insightText=data.achieveMsg;
  const maxW=W-PAD*2-60*S;
  // simple single-line truncation at max
  let displayInsight=insightText;
  ctx.font=`500 ${Math.round(13*S)}px Inter,sans-serif`;
  if(ctx.measureText(displayInsight).width>maxW){
    while(ctx.measureText(displayInsight+'…').width>maxW&&displayInsight.length>0){
      displayInsight=displayInsight.slice(0,-1);
    }
    displayInsight+='…';
  }
  ctx.fillText(displayInsight,PAD+46*S,insightY+30*S);
  ctx.font=`400 ${Math.round(10*S)}px Inter,sans-serif`;
  ctx.fillStyle='rgba(255,255,255,.3)';
  ctx.fillText('Personal Insight',PAD+46*S,insightY+48*S);

  // ── QUOTE + BRANDING ──
  const quote=SHARE_QUOTES[Math.floor(Math.random()*SHARE_QUOTES.length)];
  const qy=H-60*S;

  // Big decorative quote marks
  ctx.save();
  ctx.font=`900 ${Math.round(36*S)}px Georgia,serif`;
  ctx.fillStyle=perf.accent+'22';
  ctx.textAlign='center';
  ctx.fillText('\u201C',W/2-ctx.measureText(`"${quote}"`).width/2-12*S,qy+8*S);
  ctx.restore();

  ctx.font=`300 italic ${Math.round(13*S)}px Inter,sans-serif`;
  ctx.fillStyle='rgba(255,255,255,.22)';
  ctx.textAlign='center';
  ctx.fillText(`"${quote}"`,W/2,qy);

  // Thin separator above footer
  ctx.save();
  const footerDiv=ctx.createLinearGradient(PAD,0,W-PAD,0);
  footerDiv.addColorStop(0,'transparent');footerDiv.addColorStop(0.5,'rgba(255,255,255,.1)');footerDiv.addColorStop(1,'transparent');
  ctx.strokeStyle=footerDiv;ctx.lineWidth=1*S;
  ctx.beginPath();ctx.moveTo(PAD,H-82*S);ctx.lineTo(W-PAD,H-82*S);ctx.stroke();
  ctx.restore();

  // Ascend branding — centered with dot separator
  ctx.font=`${Math.round(13*S)}px Inter,sans-serif`;
  ctx.fillStyle='rgba(255,255,255,.15)';
  ctx.fillText('📔',W/2-45*S,H-26*S);
  ctx.font=`500 ${Math.round(10*S)}px Inter,sans-serif`;
  ctx.fillStyle='rgba(255,255,255,.15)';
  ctx.fillText('Built with Ascend',W/2-20*S,H-26*S);
  ctx.textAlign='left';
}

// ── YEARLY CARD RENDERER ───────────────────────────────────────────────────

function drawYearlyCard(canvas,data,perf){
  const W=canvas.width,H=canvas.height;
  const ctx=canvas.getContext('2d');
  const S=W/1080;
  const PAD=52*S;

  // ── BACKGROUND ──
  const bg=ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,perf.c1);bg.addColorStop(0.5,perf.c2);bg.addColorStop(1,perf.c3||perf.c1);
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // Dot noise
  ctx.save();ctx.globalAlpha=0.016;
  for(let x=0;x<W;x+=30*S){for(let y=0;y<H;y+=30*S){
    ctx.beginPath();ctx.arc(x,y,1*S,0,Math.PI*2);
    ctx.fillStyle='#fff';ctx.fill();
  }}
  ctx.restore();

  // Glow orbs
  const gR=ctx.createRadialGradient(W*0.78,H*0.1,0,W*0.78,H*0.1,W*0.5);
  gR.addColorStop(0,perf.glow);gR.addColorStop(1,'transparent');
  ctx.fillStyle=gR;ctx.fillRect(0,0,W,H);
  const gL=ctx.createRadialGradient(W*0.2,H*0.88,0,W*0.2,H*0.88,W*0.38);
  gL.addColorStop(0,perf.glow2||'rgba(255,255,255,.04)');gL.addColorStop(1,'transparent');
  ctx.fillStyle=gL;ctx.fillRect(0,0,W,H);

  function sectionLabel(text,x,y){
    ctx.save();
    ctx.beginPath();ctx.arc(x,y-3.5*S,2.5*S,0,Math.PI*2);
    ctx.fillStyle=perf.accent+'88';ctx.fill();
    ctx.font=`700 ${Math.round(9*S)}px Inter,sans-serif`;
    ctx.fillStyle='rgba(255,255,255,.32)';
    ctx.letterSpacing='2.5px';ctx.fillText(text,x+9*S,y);ctx.letterSpacing='0px';
    ctx.restore();
  }

  // ════════════════════════════════════════════
  //  ZONE 1 — HEADER
  // ════════════════════════════════════════════
  let cy=56*S;

  // Logo
  ctx.font=`${Math.round(16*S)}px Inter,sans-serif`;ctx.fillStyle='rgba(255,255,255,.5)';
  ctx.fillText('📔',PAD,cy);
  ctx.font=`600 ${Math.round(12*S)}px Inter,sans-serif`;ctx.fillStyle='rgba(255,255,255,.35)';
  ctx.fillText('ASCEND',PAD+26*S,cy-2*S);

  // Performance badge
  const badgeText=perf.label.toUpperCase();
  ctx.font=`700 ${Math.round(9.5*S)}px Inter,sans-serif`;
  const bw=ctx.measureText(badgeText).width+20*S;
  const bx=W-PAD-bw,by=cy-15*S,bh=20*S;
  roundRect(ctx,bx,by,bw,bh,bh/2);
  ctx.fillStyle=perf.accent+'22';ctx.fill();
  ctx.strokeStyle=perf.accent+'55';ctx.lineWidth=1*S;ctx.stroke();
  ctx.fillStyle=perf.accent;ctx.textAlign='center';
  ctx.fillText(badgeText,bx+bw/2,by+13.5*S);ctx.textAlign='left';

  // Year — massive
  cy+=66*S;
  ctx.save();
  ctx.font=`800 ${Math.round(100*S)}px Inter,sans-serif`;
  ctx.fillStyle='rgba(255,255,255,.06)';
  ctx.fillText(String(data.year),PAD+2*S,cy+2*S);
  ctx.restore();
  drawGlowText(ctx,String(data.year),PAD,cy,`800 ${Math.round(100*S)}px Inter,sans-serif`,'#e6edf3',perf.glow,22);

  ctx.font=`300 ${Math.round(18*S)}px Inter,sans-serif`;
  ctx.fillStyle='rgba(255,255,255,.3)';
  ctx.fillText('IN REVIEW',PAD,cy+28*S);

  // Sub message
  cy+=44*S;
  ctx.font=`400 italic ${Math.round(13*S)}px Inter,sans-serif`;
  ctx.fillStyle='rgba(255,255,255,.35)';
  ctx.fillText(data.yearMsg,PAD,cy);

  // Divider
  cy+=20*S;
  const dG=ctx.createLinearGradient(PAD,0,W-PAD,0);
  dG.addColorStop(0,perf.accent+'cc');dG.addColorStop(0.4,perf.accent+'33');dG.addColorStop(1,'transparent');
  ctx.strokeStyle=dG;ctx.lineWidth=1.5*S;
  ctx.beginPath();ctx.moveTo(PAD,cy);ctx.lineTo(W-PAD,cy);ctx.stroke();

  // BIG % hero
  cy+=60*S;
  ctx.save();
  ctx.font=`800 ${Math.round(130*S)}px Inter,sans-serif`;
  ctx.shadowColor=perf.glow;ctx.shadowBlur=55*S;
  ctx.fillStyle=perf.accent;
  ctx.fillText(data.pct+'%',PAD-4*S,cy);
  ctx.shadowBlur=0;ctx.restore();

  cy+=20*S;
  ctx.font=`500 ${Math.round(13*S)}px Inter,sans-serif`;
  ctx.fillStyle='rgba(255,255,255,.35)';
  ctx.fillText('YEARLY COMPLETION  ·  '+data.totalDone.toLocaleString()+' HABITS DONE',PAD,cy);

  // ── STAT PILLS ──
  cy+=32*S;
  const yStats=[
    {val:data.bestStreak+'d',lbl:'Best Streak',c:'#e3b341'},
    {val:String(data.habits.length),lbl:'Active Habits',c:'#58a6ff'},
    {val:data.topHabit?data.topHabit.pct+'%':'—',lbl:data.topHabit?data.topHabit.name:'Top Habit',c:perf.accent},
  ];
  const sPillW=(W-PAD*2-16*S*2)/3;
  const sPillH=62*S;
  yStats.forEach((st,i)=>{
    const sx=PAD+i*(sPillW+16*S);
    roundRect(ctx,sx,cy,sPillW,sPillH,10*S);
    ctx.fillStyle='rgba(255,255,255,.05)';ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.09)';ctx.lineWidth=1*S;ctx.stroke();
    ctx.font=`700 ${Math.round(26*S)}px 'JetBrains Mono',monospace`;
    ctx.fillStyle=st.c;ctx.textAlign='center';
    ctx.fillText(st.val,sx+sPillW/2,cy+34*S);
    ctx.font=`500 ${Math.round(8.5*S)}px Inter,sans-serif`;
    ctx.fillStyle='rgba(255,255,255,.28)';
    // Truncate label
    let lbl=st.lbl;
    while(ctx.measureText(lbl).width>sPillW-12*S&&lbl.length>0)lbl=lbl.slice(0,-1);
    ctx.fillText(lbl.toUpperCase()+(lbl.length<st.lbl.length?'…':''),sx+sPillW/2,cy+52*S);
    ctx.textAlign='left';
  });
  cy+=sPillH+36*S;

  // ════════════════════════════════════════════
  //  ZONE 2 — FULL-WIDTH YEARLY HEATMAP
  // ════════════════════════════════════════════
  sectionLabel('CONTRIBUTION GRAPH',PAD,cy);
  cy+=16*S;

  // Day labels left column
  const DOW_SHORT=['S','M','T','W','T','F','S'];
  const cellSz=Math.round(H>1080?12*S:10.5*S);
  const cellGp=Math.round(2.5*S);
  const heatLeft=PAD+18*S; // leave room for day labels

  ctx.font=`500 ${Math.round(7*S)}px Inter,sans-serif`;
  ctx.fillStyle='rgba(255,255,255,.2)';
  [1,3,5].forEach(d=>{ // Mon, Wed, Fri
    ctx.fillText(DOW_SHORT[d],PAD,cy+d*(cellSz+cellGp)+cellSz/2+2.5*S);
  });

  data.weeks.forEach((week,wi)=>{
    week.forEach((date,di)=>{
      const level=getCellLevel(date,data.habits,state.checks);
      const cx2=heatLeft+wi*(cellSz+cellGp);
      const cy2=cy+di*(cellSz+cellGp);
      roundRect(ctx,cx2,cy2,cellSz,cellSz,2*S);
      ctx.fillStyle=HEAT_COLORS[level];ctx.fill();
      if(level>=4){
        ctx.save();ctx.shadowColor=HEAT_COLORS[level];ctx.shadowBlur=4*S;ctx.fill();ctx.restore();
      }
    });
  });

  // Month labels
  cy+=7*(cellSz+cellGp)+14*S;
  const MONTHS_SHORT2=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  ctx.font=`400 ${Math.round(7.5*S)}px Inter,sans-serif`;
  ctx.fillStyle='rgba(255,255,255,.22)';
  const jan1=new Date(data.year,0,1);
  const startDow2=jan1.getDay();
  MONTHS_SHORT2.forEach((mn,mi)=>{
    const firstOfMonth=new Date(data.year,mi,1);
    const dayOfYear=Math.floor((firstOfMonth-new Date(data.year,0,1))/86400000);
    const weekIdx=Math.floor((dayOfYear+startDow2)/7);
    ctx.fillText(mn,heatLeft+weekIdx*(cellSz+cellGp),cy);
  });
  cy+=22*S;

  // ── MONTHLY BAR CHART ──
  sectionLabel('MONTHLY BREAKDOWN',PAD,cy);
  cy+=16*S;

  const barAreaW=W-PAD*2;
  const barW2=Math.floor(barAreaW/12)-5*S;
  const maxBarH=H>1080?90*S:75*S;

  data.monthlyPct.forEach((p,mi)=>{
    if(p===null)return;
    const bx=PAD+mi*(barAreaW/12);
    const bh=p>0?Math.max(5*S,maxBarH*p/100):3*S;
    const bby=cy+maxBarH-bh;

    // Track
    roundRect(ctx,bx,cy,barW2,maxBarH,3*S);
    ctx.fillStyle='rgba(255,255,255,.04)';ctx.fill();

    // Fill with glow on high bars
    roundRect(ctx,bx,bby,barW2,bh,3*S);
    const bf=ctx.createLinearGradient(0,bby,0,bby+bh);
    bf.addColorStop(0,perf.accent);bf.addColorStop(1,perf.accent+'44');
    ctx.fillStyle=bf;
    if(p>=80){ctx.save();ctx.shadowColor=perf.glow;ctx.shadowBlur=8*S;}
    ctx.fill();
    if(p>=80)ctx.restore();

    // Month label
    ctx.font=`500 ${Math.round(7.5*S)}px Inter,sans-serif`;
    ctx.fillStyle='rgba(255,255,255,.28)';
    ctx.textAlign='center';
    ctx.fillText(MONTHS_SHORT2[mi],bx+barW2/2,cy+maxBarH+14*S);

    // % label: inside bar if tall enough, above bar if short
    ctx.font=`700 ${Math.round(7.5*S)}px Inter,sans-serif`;
    if(p>22){
      ctx.fillStyle='rgba(255,255,255,.72)';
      ctx.fillText(p+'%',bx+barW2/2,bby+bh/2+3*S);
    } else if(p>0){
      ctx.fillStyle=perf.accent;
      ctx.fillText(p+'%',bx+barW2/2,bby-5*S);
    }
    ctx.textAlign='left';
  });
  cy+=maxBarH+32*S;

  // ── TOP HABIT BAR ──
  if(data.topHabit){
    const th=data.topHabit;
    const thW=W-PAD*2,thH=46*S;
    roundRect(ctx,PAD,cy,thW,thH,10*S);
    const thG=ctx.createLinearGradient(PAD,cy,PAD+thW,cy+thH);
    thG.addColorStop(0,perf.accent+'22');thG.addColorStop(1,'rgba(255,255,255,.03)');
    ctx.fillStyle=thG;ctx.fill();
    ctx.strokeStyle=perf.accent+'40';ctx.lineWidth=1.5*S;ctx.stroke();

    ctx.font=`${Math.round(18*S)}px Inter,sans-serif`;ctx.fillText('🏆',PAD+12*S,cy+32*S);
    ctx.font=`600 ${Math.round(13*S)}px Inter,sans-serif`;ctx.fillStyle='rgba(255,255,255,.75)';
    ctx.fillText('Most consistent: '+(th.emoji||'')+' '+th.name,PAD+40*S,cy+22*S);
    ctx.font=`400 ${Math.round(10*S)}px Inter,sans-serif`;ctx.fillStyle='rgba(255,255,255,.3)';
    ctx.fillText('Your strongest habit of '+data.year,PAD+40*S,cy+36*S);
    ctx.font=`700 ${Math.round(16*S)}px 'JetBrains Mono',monospace`;ctx.fillStyle=perf.accent;
    ctx.textAlign='right';ctx.fillText(th.pct+'%',PAD+thW-14*S,cy+30*S);ctx.textAlign='left';
    cy+=thH+24*S;
  }

  // ── FOOTER ──
  const quote=SHARE_QUOTES[Math.floor(Math.random()*SHARE_QUOTES.length)];

  // Thin separator
  ctx.save();
  const fDiv=ctx.createLinearGradient(PAD,0,W-PAD,0);
  fDiv.addColorStop(0,'transparent');fDiv.addColorStop(0.5,'rgba(255,255,255,.1)');fDiv.addColorStop(1,'transparent');
  ctx.strokeStyle=fDiv;ctx.lineWidth=1*S;
  ctx.beginPath();ctx.moveTo(PAD,H-80*S);ctx.lineTo(W-PAD,H-80*S);ctx.stroke();
  ctx.restore();

  ctx.font=`300 italic ${Math.round(12*S)}px Inter,sans-serif`;
  ctx.fillStyle='rgba(255,255,255,.22)';
  ctx.textAlign='center';
  ctx.fillText(`"${quote}"`,W/2,H-52*S);
  ctx.font=`${Math.round(12*S)}px Inter,sans-serif`;ctx.fillStyle='rgba(255,255,255,.15)';
  ctx.fillText('📔',W/2-42*S,H-26*S);
  ctx.font=`500 ${Math.round(10*S)}px Inter,sans-serif`;ctx.fillStyle='rgba(255,255,255,.15)';
  ctx.fillText('Built with Ascend',W/2-18*S,H-26*S);
  ctx.textAlign='left';
}

// ── MAIN GENERATE FUNCTION ─────────────────────────────────────────────────

function generateShareCard(type){
  // Show preview overlay
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:950;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);animation:fadeIn .18s ease;padding:16px;flex-direction:column;gap:16px';
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove()});

  const fmt=getShareFormat()||'portrait';
  const W=1080,H=fmt==='square'?1080:1350;

  const canvas=document.createElement('canvas');
  canvas.width=W;canvas.height=H;
  canvas.style.cssText=`max-width:min(360px,90vw);max-height:70vh;object-fit:contain;border-radius:14px;box-shadow:0 24px 80px rgba(0,0,0,.8)`;

  let data,perf;
  if(type==='monthly'){
    data=collectMonthlyData();
    perf=getPerf(data.pct);
    drawMonthlyCard(canvas,data,perf);
  } else {
    data=collectYearlyData();
    perf=getPerf(data.pct);
    drawYearlyCard(canvas,data,perf);
  }

  // Buttons row
  const btnRow=document.createElement('div');
  btnRow.style.cssText='display:flex;gap:10px;flex-wrap:wrap;justify-content:center';

  const dlBtn=document.createElement('button');
  dlBtn.style.cssText='background:'+perf.accent+';border:none;color:#000;padding:11px 24px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;font-family:Inter,sans-serif;transition:all .15s;display:flex;align-items:center;gap:7px';
  dlBtn.innerHTML='⬇ Download PNG';
  dlBtn.onmouseover=()=>dlBtn.style.opacity='.85';
  dlBtn.onmouseout=()=>dlBtn.style.opacity='1';
  dlBtn.addEventListener('click',()=>{
    const a=document.createElement('a');
    const fname=type==='monthly'?`ascend-${MONTHS[data.month].toLowerCase()}-${data.year}`:`ascend-${data.year}-recap`;
    a.download=fname+'.png';
    a.href=canvas.toDataURL('image/png');
    a.click();
  });

  const closeBtn=document.createElement('button');
  closeBtn.style.cssText='background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#e6edf3;padding:11px 20px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;font-family:Inter,sans-serif;transition:all .15s';
  closeBtn.textContent='Close';
  closeBtn.addEventListener('click',()=>overlay.remove());

  const hint=document.createElement('div');
  hint.style.cssText='font-size:10px;color:rgba(255,255,255,.25);text-align:center;margin-top:-4px';
  hint.textContent='Long-press on mobile to save · Right-click on desktop';

  btnRow.appendChild(dlBtn);btnRow.appendChild(closeBtn);
  overlay.appendChild(canvas);
  overlay.appendChild(btnRow);
  overlay.appendChild(hint);
  document.body.appendChild(overlay);
}

// ── BOOT ─────────────────────────────────────────────────────────────────────
// Only register SW when actually hosted on GitHub Pages — never on local file://
if(isHosted && !isInStandaloneMode()){
  registerSW();
}
